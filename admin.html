<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaap Master Admin v3.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --orange: #f38630; 
            --orange-glow: rgba(243, 134, 48, 0.4);
            --bg: #050505; 
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --red: #ff4d4d;
        }

        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at top right, #1a1005, transparent);
            color: #e0e0e0; 
            font-family: 'Outfit', sans-serif; 
            margin: 0; padding: 20px; 
            min-height: 100vh;
        }

        /* 1. AUTH SECTION */
        #authSection { 
            max-width: 400px; margin: 150px auto; text-align: center; 
            padding: 40px; background: var(--card-bg); border-radius: 24px;
            backdrop-filter: blur(20px); border: 1px solid var(--border);
        }

        /* 2. DASHBOARD LAYOUT */
        .admin-container { max-width: 1100px; margin: 0 auto; display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        /* 3. STAT CARDS */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .glass-card {
            background: var(--card-bg); backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-radius: 20px; padding: 25px;
            transition: 0.3s;
        }
        .glass-card:hover { border-color: var(--orange); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .stat-label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .stat-val { font-size: 2.5rem; font-weight: 900; background: linear-gradient(to right, #fff, var(--orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-top: 10px; }

        /* 4. CONTROL BOXES */
        .control-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 30px; }
        textarea, input { 
            background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; 
            padding: 12px 15px; border-radius: 10px; width: 100%; box-sizing: border-box; font-family: inherit;
        }
        input:focus { border-color: var(--orange); outline: none; box-shadow: 0 0 10px var(--orange-glow); }

        /* 5. TABLE DESIGN */
        .table-container { overflow-x: auto; }
        .user-table { width: 100%; border-spacing: 0 10px; border-collapse: separate; }
        .user-table th { padding: 15px; color: var(--orange); text-align: left; font-size: 0.9rem; text-transform: uppercase; }
        .user-table tr { background: rgba(255,255,255,0.03); transition: 0.2s; }
        .user-table tr:hover { background: rgba(255,255,255,0.07); }
        .user-table td { padding: 15px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .user-table td:first-child { border-left: 1px solid var(--border); border-radius: 15px 0 0 15px; }
        .user-table td:last-child { border-right: 1px solid var(--border); border-radius: 0 15px 15px 0; }

        /* Buttons */
        .btn { padding: 12px 25px; border-radius: 12px; cursor: pointer; border: none; font-weight: 700; transition: 0.3s; font-family: inherit; }
        .btn-primary { background: var(--orange); color: white; box-shadow: 0 4px 15px var(--orange-glow); }
        .btn-primary:hover { transform: scale(1.05); filter: brightness(1.1); }
        .btn-danger { background: rgba(255, 77, 77, 0.1); color: var(--red); border: 1px solid var(--red); }
        .btn-danger:hover { background: var(--red); color: white; }

        .user-dp { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--orange); object-fit: cover; }
        .status-pulse { height: 8px; width: 8px; background: #2ecc71; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #2ecc71; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; transform: scale(0.9); } 70% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.5; transform: scale(0.9); } }
    </style>
</head>
<body>

    <div id="authSection">
        <h2 style="color: var(--orange); font-weight: 900;">ADMIN LOGIN</h2>
        <p style="color: #666; font-size: 0.9rem;">Master Control Access Only</p>
        <input type="password" id="adminPass" placeholder="Enter Master Password" style="margin: 20px 0; text-align: center;">
        <button class="btn btn-primary" onclick="checkAuth()" style="width: 100%;">ACCESS DASHBOARD</button>
    </div>

    <div class="admin-container" id="adminDash">
        <div class="header-flex">
            <h1 style="font-weight: 900; letter-spacing: -1px;">Devotee <span style="color: var(--orange);">Command</span></h1>
            <button class="btn btn-danger" onclick="location.reload()">LOCK SYSTEM</button>
        </div>

        <div class="stats-grid">
            <div class="glass-card"><div class="stat-label">Total Devotees</div><div class="stat-val" id="statUsers">0</div></div>
            <div class="glass-card"><div class="stat-label">Global Jaaps</div><div class="stat-val" id="statJaaps">0</div></div>
            <div class="glass-card"><div class="stat-label">Active Now</div><div class="stat-val" id="statToday">0</div></div>
        </div>

        <div class="control-box">
            <h3 style="margin-top:0; color: var(--orange);">📢 Global App Announcement</h3>
            <textarea id="globalMsg" rows="2" placeholder="Write message for all devotees..."></textarea>
            <button class="btn btn-primary" style="margin-top:15px" onclick="updateBroadcast()">PUSH ANNOUNCEMENT</button>
        </div>

        <div style="display: flex; gap: 15px; margin-bottom: 20px; align-items: center;">
            <input type="text" id="userSearch" placeholder="🔍 Search devotee name..." oninput="filterUsers()" style="flex: 1;">
            <button class="btn btn-danger" onclick="resetAllDaily()" style="white-space:nowrap;">RESET ALL DAILY</button>
        </div>

        <div class="table-container">
            <table class="user-table">
                <thead>
                    <tr>
                        <th>Profile</th>
                        <th>Devotee Name</th>
                        <th>Daily Jaap</th>
                        <th>Total Jaap</th>
                        <th>Management</th>
                    </tr>
                </thead>
                <tbody id="userList"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, writeBatch, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArfXVNLQhYAspd2xmZuwLb7bxLaY8sQqY",
            authDomain: "jaap-fdd80.firebaseapp.com",
            projectId: "jaap-fdd80",
            storageBucket: "jaap-fdd80.firebasestorage.app",
            messagingSenderId: "375289521394",
            appId: "1:375289521394:web:ced2cafa4d1743d5ab9c6b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allUsersData = [];

        window.checkAuth = () => {
            if(document.getElementById('adminPass').value === "admin5") {
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('adminDash').style.display = 'block';
                loadDashboard();
            } else { alert("❌ Unauthorized Access!"); }
        };

        function loadDashboard() {
            onSnapshot(collection(db, "users"), (snapshot) => {
                allUsersData = [];
                let grandTotal = 0;
                let online = 0;

                snapshot.forEach(doc => {
                    const d = doc.data();
                    allUsersData.push({ id: doc.id, ...d });
                    grandTotal += (d.totalCount || 0);
                    if(d.dailyCount > 0) online++;
                });

                document.getElementById('statUsers').innerText = allUsersData.length;
                document.getElementById('statJaaps').innerText = grandTotal.toLocaleString();
                document.getElementById('statToday').innerText = online;
                renderUsers(allUsersData);
            });
        }

        function renderUsers(data) {
            const list = document.getElementById('userList');
            list.innerHTML = '';
            data.forEach(user => {
                const dp = `https://ui-avatars.com/api/?name=${user.id}&background=f38630&color=fff&bold=true`;
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><img src="${dp}" class="user-dp"></td>
                    <td><span class="status-pulse"></span><b>${user.id}</b></td>
                    <td><input type="number" id="d-${user.id}" value="${user.dailyCount || 0}" style="width: 100px;"></td>
                    <td><input type="number" id="t-${user.id}" value="${user.totalCount || 0}" style="width: 120px;"></td>
                    <td>
                        <button class="btn btn-primary" onclick="updateUser('${user.id}')" style="padding: 8px 15px; font-size: 0.8rem;">SAVE</button>
                        <button class="btn btn-danger" onclick="deleteUser('${user.id}')" style="padding: 8px 15px; font-size: 0.8rem;">BAN</button>
                    </td>
                `;
                list.appendChild(row);
            });
        }

        window.updateUser = async (name) => {
            const daily = parseInt(document.getElementById(`d-${name}`).value);
            const total = parseInt(document.getElementById(`t-${name}`).value);
            await updateDoc(doc(db, "users", name), { dailyCount: daily, totalCount: total });
            alert(`✅ ${name} updated!`);
        };

        window.deleteUser = async (name) => {
            if(confirm(`Permanently remove ${name} from list?`)) await deleteDoc(doc(db, "users", name));
        };

        window.updateBroadcast = async () => {
            const msg = document.getElementById('globalMsg').value;
            await updateDoc(doc(db, "appConfig", "settings"), { broadcastMsg: msg });
            alert("🚀 Broadcasted to all users!");
        };

        window.resetAllDaily = async () => {
            if(confirm("Zero all daily counts for the new day?")) {
                const batch = writeBatch(db);
                const query = await getDocs(collection(db, "users"));
                query.forEach(d => batch.update(d.ref, { dailyCount: 0 }));
                await batch.commit();
                alert("🌅 All daily counts reset!");
            }
        };

        window.filterUsers = () => {
            const term = document.getElementById('userSearch').value.toLowerCase();
            const filtered = allUsersData.filter(u => u.id.toLowerCase().includes(term));
            renderUsers(filtered);
        };
    </script>
</body>
</html>
