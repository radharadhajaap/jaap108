<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaap Admin v5.0 - Divine Analytics</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #f38630; --gold-glow: rgba(243, 134, 48, 0.4);
            --bg: #050505; --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1); --red: #ff4d4d; --green: #2ecc71;
        }

        body { 
            background: var(--bg); color: #e0e0e0; font-family: 'Outfit', sans-serif; 
            margin: 0; padding: 20px; min-height: 100vh;
        }

        /* 1. LAYOUT & CONTAINERS */
        #authSection { 
            max-width: 400px; margin: 150px auto; text-align: center; 
            padding: 40px; background: var(--card-bg); border-radius: 24px;
            backdrop-filter: blur(20px); border: 1px solid var(--border);
        }

        .admin-container { max-width: 1200px; margin: 0 auto; display: none; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        /* 2. GLOBAL GOAL PROGRESS BAR */
        .goal-box { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 30px; }
        .progress-container { background: rgba(0,0,0,0.5); height: 12px; border-radius: 6px; overflow: hidden; margin: 15px 0; border: 1px solid var(--border); }
        #globalProgressBar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--gold), #fff); box-shadow: 0 0 15px var(--gold-glow); transition: width 1.5s ease-in-out; }

        /* 3. ANALYTICS CARDS */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .glass-card { background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 20px; padding: 20px; transition: 0.3s; }
        .stat-val { font-size: 2rem; font-weight: 900; color: var(--gold); }

        /* 4. USER STATUS TAGS */
        .live-tag { font-size: 0.6rem; color: var(--green); border: 1px solid var(--green); padding: 2px 6px; border-radius: 4px; animation: blink 1s infinite; }
        .inactive-tag { font-size: 0.6rem; color: var(--red); border: 1px solid var(--red); padding: 2px 6px; border-radius: 4px; opacity: 0.8; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* 5. TABLE & ROWS */
        .table-container { overflow-x: auto; }
        .user-table { width: 100%; border-spacing: 0 10px; border-collapse: separate; }
        .user-table tr { background: rgba(255,255,255,0.03); transition: 0.2s; }
        .inactive-row { opacity: 0.5; filter: grayscale(0.8); }
        .top-row { border: 1px solid var(--gold) !important; background: rgba(243, 134, 48, 0.1) !important; }

        .user-table td { padding: 15px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .user-table td:first-child { border-left: 1px solid var(--border); border-radius: 12px 0 0 12px; }
        .user-table td:last-child { border-right: 1px solid var(--border); border-radius: 0 12px 12px 0; }

        /* 6. BUTTONS & INPUTS */
        .btn { padding: 10px 18px; border-radius: 10px; cursor: pointer; border: none; font-weight: 700; transition: 0.3s; font-family: inherit; }
        .btn-gold { background: var(--gold); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: #888; }
        .btn-outline.active { border-color: var(--gold); color: var(--gold); }
        input, textarea { background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; outline: none; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="authSection">
        <h2 style="color: var(--gold); font-weight: 900;">DIVINE ANALYTICS v5.0</h2>
        <input type="password" id="adminPass" placeholder="Master Key" style="margin: 20px 0; text-align: center;">
        <button class="btn btn-gold" onclick="checkAuth()" style="width: 100%;">LOGIN TO COMMAND CENTER</button>
    </div>

    <div class="admin-container" id="adminDash">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h1 style="font-weight: 900; margin: 0;">Divine <span style="color: var(--gold);">Analytics</span></h1>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-outline" onclick="exportToCSV()">📂 BACKUP</button>
                <button class="btn btn-gold" onclick="location.reload()">LOCK</button>
            </div>
        </div>

        <div class="goal-box">
            <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
                <span style="color: var(--gold); font-weight: bold;">🎯 GLOBAL GOAL: 1 CRORE JAAP</span>
                <span id="progressText">0.0000% Achieved</span>
            </div>
            <div class="progress-container"><div id="globalProgressBar"></div></div>
        </div>

        <div class="stats-grid">
            <div class="glass-card"><h3>Devotees</h3><p class="stat-val" id="statUsers">0</p></div>
            <div class="glass-card"><h3>Global Total</h3><p class="stat-val" id="statJaaps">0</p></div>
            <div class="glass-card"><h3>Inactive (3D+)</h3><p class="stat-val" id="statInactive" style="color:var(--red)">0</p></div>
            <div class="glass-card"><h3>Reset Timer</h3><p id="timer" style="color: #888; font-weight: bold;">00:00:00</p></div>
        </div>

        <div style="display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 25px;">
            <input type="text" id="userSearch" placeholder="🔍 Search by name..." oninput="filterAndRender()" style="flex: 2; min-width: 200px;">
            <div style="display: flex; gap: 5px; flex: 1; min-width: 200px;">
                <button class="btn btn-outline active" id="sortDaily" onclick="setSort('daily')">Daily High</button>
                <button class="btn btn-outline" id="sortTotal" onclick="setSort('total')">All-Time</button>
            </div>
        </div>

        <div class="table-container">
            <table class="user-table">
                <thead>
                    <tr style="background:transparent; color: #666; font-size: 0.75rem; text-transform: uppercase;">
                        <th>DEVOTEE</th><th>DAILY</th><th>TOTAL</th><th>LAST ACTIVE</th><th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="userList"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, writeBatch, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArfXVNLQhYAspd2xmZuwLb7bxLaY8sQqY",
            authDomain: "jaap-fdd80.firebaseapp.com",
            projectId: "jaap-fdd80",
            storageBucket: "jaap-fdd80.firebasestorage.app",
            messagingSenderId: "375289521394",
            appId: "1:375289521394:web:ced2cafa4d1743d5ab9c6b"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        let allUsers = [];
        let currentSort = 'daily';

        window.checkAuth = () => {
            if(document.getElementById('adminPass').value === "admin5") {
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('adminDash').style.display = 'block';
                initAdmin();
            } else { alert("Access Denied!"); }
        };

        function initAdmin() {
            onSnapshot(collection(db, "users"), (snap) => {
                allUsers = [];
                let grandTotal = 0;
                let inactiveCount = 0;
                const threeDaysAgo = Date.now() - (3 * 24 * 60 * 60 * 1000);

                snap.forEach(d => {
                    const data = d.data();
                    const userObj = { id: d.id, ...data };
                    allUsers.push(userObj);
                    grandTotal += (data.totalCount || 0);
                    if(data.lastTimestamp < threeDaysAgo) inactiveCount++;
                });

                // Update Progress UI
                const goal = 10000000;
                const percent = (grandTotal / goal) * 100;
                document.getElementById('globalProgressBar').style.width = Math.min(percent, 100) + "%";
                document.getElementById('progressText').innerText = percent.toFixed(4) + "% Achieved";
                
                document.getElementById('statUsers').innerText = allUsers.length;
                document.getElementById('statJaaps').innerText = grandTotal.toLocaleString();
                document.getElementById('statInactive').innerText = inactiveCount;
                
                filterAndRender();
            });
            startResetTimer();
        }

        window.setSort = (type) => {
            currentSort = type;
            document.getElementById('sortDaily').classList.toggle('active', type === 'daily');
            document.getElementById('sortTotal').classList.toggle('active', type === 'total');
            filterAndRender();
        };

        window.filterAndRender = () => {
            const term = document.getElementById('userSearch').value.toLowerCase();
            let filtered = allUsers.filter(u => u.id.toLowerCase().includes(term));
            
            // Apply Sort
            filtered.sort((a,b) => {
                return currentSort === 'daily' ? 
                    (b.dailyCount || 0) - (a.dailyCount || 0) : 
                    (b.totalCount || 0) - (a.totalCount || 0);
            });

            const list = document.getElementById('userList');
            list.innerHTML = '';
            const maxVal = filtered.length > 0 ? (currentSort === 'daily' ? filtered[0].dailyCount : filtered[0].totalCount) : 0;

            filtered.forEach(u => {
                const isLive = u.lastTimestamp > (Date.now() - 10000);
                const isInactive = u.lastTimestamp < (Date.now() - (3 * 24 * 60 * 60 * 1000));
                const lastSeen = u.lastTimestamp ? new Date(u.lastTimestamp).toLocaleDateString() : 'Never';
                
                const row = document.createElement('tr');
                if(isInactive) row.className = 'inactive-row';
                if(!isInactive && (currentSort === 'daily' ? u.dailyCount : u.totalCount) === maxVal && maxVal > 0) row.classList.add('top-row');

                row.innerHTML = `
                    <td>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <img src="https://ui-avatars.com/api/?name=${u.id}&background=random" style="width:35px; border-radius:50%;">
                            <div>
                                <b>${u.id}</b><br>
                                ${isLive ? '<span class="live-tag">TAPPING</span>' : (isInactive ? '<span class="inactive-tag">ABSENT</span>' : '')}
                            </div>
                        </div>
                    </td>
                    <td><input type="number" id="d-${u.id}" value="${u.dailyCount || 0}" style="width:80px;"></td>
                    <td><input type="number" id="t-${u.id}" value="${u.totalCount || 0}" style="width:100px;"></td>
                    <td style="font-size:0.8rem; color:#666;">${lastSeen}</td>
                    <td>
                        <button class="btn btn-gold" style="padding:5px 10px;" onclick="updateUser('${u.id}')">💾</button>
                    </td>
                `;
                list.appendChild(row);
            });
        };

        function startResetTimer() {
            setInterval(() => {
                const now = new Date();
                const night = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0);
                const diff = night - now;
                const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
                const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
                const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        window.updateUser = async (id) => {
            const d = parseInt(document.getElementById(`d-${id}`).value);
            const t = parseInt(document.getElementById(`t-${id}`).value);
            await updateDoc(doc(db, "users", id), { dailyCount: d, totalCount: t });
            alert("Devotee updated!");
        };

        window.exportToCSV = () => {
            let csv = 'Name,Daily,Total,LastTimestamp\n';
            allUsers.forEach(u => csv += `${u.id},${u.dailyCount},${u.totalCount},${u.lastTimestamp}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Divine_Analytics_Backup.csv`;
            a.click();
        };
    </script>
</body>
</html>
