<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radha Rani Jaap - Soul Sync Login</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --orange: #f38630; --gold: #ffcc33; --bg: #050301; 
            --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.12);
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg); color: white;
            font-family: 'Outfit', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            overflow: hidden;
        }

        /* 🌌 Divine Background Particles */
        .particles {
            position: fixed; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a0f05, #000);
        }
        .glow-sphere {
            position: absolute; width: 400px; height: 400px; background: var(--orange);
            filter: blur(150px); border-radius: 50%; opacity: 0.12; animation: float 8s infinite alternate;
        }
        @keyframes float { from { transform: translate(-10%, -10%); } to { transform: translate(10%, 10%); } }

        /* ✨ Glassmorphism Card 2.0 */
        .login-card {
            width: 88%; max-width: 400px; background: var(--glass);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            padding: 50px 35px; border-radius: 40px; border: 1px solid var(--border);
            text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            transform: translateY(0); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 📸 Profile Engine */
        .profile-container {
            position: relative; width: 130px; height: 130px; margin: 0 auto 35px;
        }
        #profilePreview {
            width: 100%; height: 100%; border-radius: 40px; object-fit: cover;
            border: 2px solid var(--border); transition: 0.4s;
        }
        .profile-container::after {
            content: ''; position: absolute; inset: -5px; border-radius: 45px;
            background: linear-gradient(135deg, var(--orange), transparent); z-index: -1;
            animation: rotateGlow 4s linear infinite;
        }
        @keyframes rotateGlow { 0% { opacity: 0.3; } 50% { opacity: 0.8; } 100% { opacity: 0.3; } }

        .upload-badge {
            position: absolute; bottom: -10px; right: -10px; background: var(--orange);
            width: 40px; height: 40px; border-radius: 15px; display: flex; 
            align-items: center; justify-content: center; border: 4px solid var(--bg);
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        h2 { font-size: 2.2rem; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .subtitle { color: var(--orange); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 3px; margin-top: 5px; }

        /* ⌨️ Form Inputs */
        .form-group { margin-top: 30px; position: relative; }
        input {
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            padding: 18px 25px; border-radius: 20px; color: white; font-size: 1rem;
            box-sizing: border-box; outline: none; transition: 0.3s; font-family: inherit;
        }
        input:focus { border-color: var(--orange); background: rgba(255,255,255,0.07); box-shadow: 0 0 20px rgba(243, 134, 48, 0.15); }
        input::placeholder { color: rgba(255,255,255,0.3); }

        /* ⚡ Button Engine */
        .shimmer-btn {
            width: 100%; padding: 20px; margin-top: 40px; border-radius: 20px;
            border: none; background: linear-gradient(135deg, #f38630, #ff5722);
            color: white; font-weight: 800; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 15px 30px rgba(243, 134, 48, 0.3);
            position: relative; overflow: hidden; transition: 0.3s;
        }
        .shimmer-btn:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(243, 134, 48, 0.4); }
        .shimmer-btn:active { transform: scale(0.96); }

        .shimmer-btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer { 100% { left: 200%; } }
    </style>
</head>
<body>

<div class="particles"><div class="glow-sphere"></div></div>

<div class="login-card">
    <div class="profile-container">
        <img id="profilePreview" src="https://ui-avatars.com/api/?name=Devotee&background=1a1a1a&color=f38630&length=1" alt="Avatar">
        <label for="fileInput" class="upload-badge">
            <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2m10 10a2 2 0 1 0-4 0 2 2 0 0 0 4 0m-2-4a4 4 0 1 1-4 4 4 4 0 0 1 4-4Z"/></svg>
        </label>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
    </div>

    <h2>Radhe Radhe</h2>
    <div class="subtitle">Spiritual Journey</div>

    <div class="form-group">
        <input type="text" id="userName" placeholder="Apna Pavitra Naam Likhein" autocomplete="off">
    </div>

    <div class="form-group" style="margin-top: 15px;">
        <input type="tel" id="userPhone" placeholder="Mobile Number (91+)" maxlength="10">
    </div>
    
    <button class="shimmer-btn" id="submitBtn" onclick="handleLogin()">START JOURNEY</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyArfXVNLQhYAspd2xmZuwLb7bxLaY8sQqY",
        authDomain: "jaap-fdd80.firebaseapp.com",
        projectId: "jaap-fdd80",
        storageBucket: "jaap-fdd80.firebasestorage.app",
        messagingSenderId: "375289521394",
        appId: "1:375289521394:web:ced2cafa4d1743d5ab9c6b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let compressedPic = "";

    // ✨ Fast Image Compression
    document.getElementById('fileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 150; canvas.height = 150;
                canvas.getContext('2d').drawImage(img, 0, 0, 150, 150);
                compressedPic = canvas.toDataURL('image/jpeg', 0.7);
                document.getElementById('profilePreview').src = compressedPic;
            };
        };
        reader.readAsDataURL(file);
    });

    window.handleLogin = async () => {
        const name = document.getElementById('userName').value.trim();
        const phone = document.getElementById('userPhone').value.trim();
        const btn = document.getElementById('submitBtn');

        if (name.length < 3 || phone.length < 10) {
            alert("Kripya Naam aur Sahi Number bharein");
            return;
        }

        btn.innerText = "Connecting Soul...";
        btn.style.opacity = "0.7";

        try {
            await setDoc(doc(db, "users", name), {
                fullName: name,
                mobile: phone,
                profilePic: compressedPic,
                totalCount: 0,
                dailyCount: 0,
                lastTimestamp: Date.now(),
                streak: 0
            }, { merge: true });

            localStorage.setItem('jaapUserName', name);
            window.location.href = "index.html";
        } catch (e) {
            alert("Error: Internet Check Karein");
            btn.innerText = "START JOURNEY";
            btn.style.opacity = "1";
        }
    };
</script>
</body>
</html>
