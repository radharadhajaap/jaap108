<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radha Rani Jaap - Ultra Fast Login</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --orange: #f38630; --bg: #050301; 
            --glass: rgba(255, 255, 255, 0.05);
        }

        /* ⚡ Performance Tip: Using transform & opacity for 60FPS */
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Outfit', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            overflow: hidden; will-change: transform;
        }

        /* Optimized Background - No heavy filters */
        .bg-glow {
            position: fixed; width: 300px; height: 300px; background: var(--orange);
            filter: blur(100px); border-radius: 50%; opacity: 0.1; z-index: -1;
            transform: translate3d(0,0,0); /* Hardware Acceleration */
        }

        .login-card {
            width: 88%; max-width: 380px; background: var(--glass);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 40px 30px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; contain: content; /* CSS Containment for Speed */
        }

        /* Profile Area with Pulse Skeleton */
        .profile-wrap {
            width: 120px; height: 120px; margin: 0 auto 30px; position: relative;
        }
        #profilePreview {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 2px solid var(--orange); background: #111;
        }
        
        .shimmer-btn {
            width: 100%; padding: 18px; margin-top: 30px; border-radius: 18px;
            border: none; background: linear-gradient(135deg, #f38630, #ff5722);
            color: white; font-weight: 800; cursor: pointer;
            transition: transform 0.1s ease;
        }
        .shimmer-btn:active { transform: scale(0.95); }

        /* Smooth Input Transitions */
        input {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 15px; color: white; margin-bottom: 15px;
            box-sizing: border-box; outline: none; font-family: inherit;
        }
        input:focus { border-color: var(--orange); }

        /* Loader Animation */
        .loader {
            display: none; width: 20px; height: 20px; border: 3px solid #fff;
            border-bottom-color: transparent; border-radius: 50%;
            animation: rotation 0.6s linear infinite; display: inline-block; vertical-align: middle;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="login-card">
    <div class="profile-wrap">
        <img id="profilePreview" src="https://ui-avatars.com/api/?name=User&background=111&color=f38630" alt="Avatar">
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        <label for="fileInput" style="position:absolute; bottom:0; right:0; background:var(--orange); padding:8px; border-radius:50%; cursor:pointer;">📷</label>
    </div>

    <h2 style="margin:0; font-weight:800;">Radhe Radhe</h2>
    <p style="opacity:0.6; font-size:0.9rem; margin-bottom:25px;">Enter your details to begin</p>

    <input type="text" id="userName" placeholder="Full Name" required>
    <input type="tel" id="userPhone" placeholder="Mobile Number" maxlength="10">
    
    <button class="shimmer-btn" id="submitBtn" onclick="handleLogin()">
        <span id="btnText">Prawesh Karein</span>
        <span id="btnLoader" class="loader" style="display:none"></span>
    </button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyArfXVNLQhYAspd2xmZuwLb7bxLaY8sQqY",
        authDomain: "jaap-fdd80.firebaseapp.com",
        projectId: "jaap-fdd80",
        storageBucket: "jaap-fdd80.firebasestorage.app",
        messagingSenderId: "375289521394",
        appId: "1:375289521394:web:ced2cafa4d1743d5ab9c6b"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let compressedPic = "";

    // ⚡ Fast Image Processing
    document.getElementById('fileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if(!file) return;
        
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 120; canvas.height = 120;
                canvas.getContext('2d').drawImage(img, 0, 0, 120, 120);
                compressedPic = canvas.toDataURL('image/jpeg', 0.6);
                document.getElementById('profilePreview').src = compressedPic;
            }
        }
    }, {passive: true});

    // ⚡ Logic: Optimized Login
    window.handleLogin = async () => {
        const name = document.getElementById('userName').value.trim();
        const phone = document.getElementById('userPhone').value.trim();
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');

        if(!name || phone.length < 10) {
            alert("Sahi jaankari bharein!");
            return;
        }

        // Visual Feedback
        btnText.style.display = "none";
        btnLoader.style.display = "inline-block";

        try {
            const userRef = doc(db, "users", name);
            
            // Check if user already exists (Optimistic UI)
            const snap = await getDoc(userRef);
            
            const userData = {
                fullName: name,
                mobile: phone,
                profilePic: compressedPic || (snap.exists() ? snap.data().profilePic : ""),
                totalCount: snap.exists() ? snap.data().totalCount : 0,
                dailyCount: snap.exists() ? snap.data().dailyCount : 0,
                lastTimestamp: Date.now()
            };

            await setDoc(userRef, userData, { merge: true });
            
            localStorage.setItem('jaapUserName', name);
            window.location.href = "index.html";
        } catch (e) {
            console.error(e);
            btnText.style.display = "inline-block";
            btnLoader.style.display = "none";
            alert("Network Error!");
        }
    };

    // Auto-login Check
    window.addEventListener('load', () => {
        if(localStorage.getItem('jaapUserName')) {
            window.location.href = "index.html";
        }
    });
</script>
</body>
</html>
