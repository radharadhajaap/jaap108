<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radha Rani Jaap - Premium Login</title>
    <style>
        :root { 
            --orange: #f38630; 
            --gold: #ffcc33;
            --bg: #0d0905; 
            --glass: rgba(255, 255, 255, 0.07);
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg); color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background-image: radial-gradient(circle at top right, #2c1a0a, transparent),
                              radial-gradient(circle at bottom left, #1a0f05, transparent);
            overflow: hidden;
        }

        /* Animated Background Blur */
        .bg-glow {
            position: fixed; width: 300px; height: 300px; background: var(--orange);
            filter: blur(120px); border-radius: 50%; opacity: 0.15; z-index: -1;
            animation: move 10s infinite alternate;
        }
        @keyframes move { from { transform: translate(-50%, -50%); } to { transform: translate(50%, 50%); } }

        .login-card {
            width: 85%; max-width: 380px; 
            background: var(--glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px; border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.1); 
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .profile-upload {
            position: relative; width: 110px; height: 110px; margin: 0 auto 30px;
        }
        #profilePreview {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover; 
            border: 3px solid var(--orange); padding: 5px;
            box-shadow: 0 0 20px rgba(243, 134, 48, 0.3);
            transition: 0.3s;
        }
        .upload-icon {
            position: absolute; bottom: 5px; right: 5px; background: linear-gradient(135deg, var(--orange), #ff5722);
            width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-size: 1rem; cursor: pointer; border: 2px solid var(--bg);
        }

        h2 { font-size: 2rem; margin: 0; background: linear-gradient(to bottom, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { opacity: 0.6; font-size: 0.85rem; margin-top: 8px; margin-bottom: 30px; letter-spacing: 1px; }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.75rem; color: var(--orange); margin-left: 12px; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }

        input {
            width: 100%; padding: 15px 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.4); color: white; box-sizing: border-box; font-size: 1rem;
            outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--orange); box-shadow: 0 0 10px rgba(243, 134, 48, 0.2); }

        button {
            width: 100%; padding: 16px; margin-top: 25px; border-radius: 15px; border: none;
            background: linear-gradient(135deg, var(--orange), #ff5722);
            color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem;
            box-shadow: 0 10px 20px rgba(243, 134, 48, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:active { transform: scale(0.98); }
        .loading { opacity: 0.7; pointer-events: none; }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="login-card" id="loginForm">
    <h2>Radhe Radhe</h2>
    <p>Prarambh Karein Apni Yatra</p>

    <div class="profile-upload">
        <img id="profilePreview" src="https://ui-avatars.com/api/?name=User&background=333&color=f38630" alt="Profile">
        <label for="fileInput" class="upload-icon">📷</label>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
    </div>

    <div class="input-group">
        <label>Aapka Naam</label>
        <input type="text" id="userName" placeholder="e.g. Krishna Das" required>
    </div>

    <div class="input-group">
        <label>Mobile Number</label>
        <input type="tel" id="userPhone" placeholder="91-0000000000" required>
    </div>
    
    <button id="submitBtn" onclick="handleLogin()">Prawesh Karein</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyArfXVNLQhYAspd2xmZuwLb7bxLaY8sQqY",
        authDomain: "jaap-fdd80.firebaseapp.com",
        projectId: "jaap-fdd80",
        storageBucket: "jaap-fdd80.firebasestorage.app",
        messagingSenderId: "375289521394",
        appId: "1:375289521394:web:ced2cafa4d1743d5ab9c6b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let compressedImageBase64 = "";

    // Compression Logic
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function(event) {
            const img = new Image();
            img.src = event.target.result;
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 150; 
                const scaleSize = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scaleSize;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                compressedImageBase64 = canvas.toDataURL('image/jpeg', 0.6);
                document.getElementById('profilePreview').src = compressedImageBase64;
            };
        };
    });

    window.handleLogin = async () => {
        const name = document.getElementById('userName').value.trim();
        const phone = document.getElementById('userPhone').value.trim();
        const btn = document.getElementById('submitBtn');

        if (!name || !phone) {
            alert("Kripya sabhi jaankari bharein");
            return;
        }

        btn.innerText = "Pratiksha Karein...";
        btn.classList.add('loading');

        try {
            const userRef = doc(db, "users", name);
            await setDoc(userRef, {
                fullName: name,
                mobile: phone,
                profilePic: compressedImageBase64,
                totalCount: 0,
                dailyCount: 0,
                lastDate: new Date().toLocaleDateString(),
                streak: 0
            }, { merge: true });

            localStorage.setItem('jaapUserName', name);
            window.location.href = "index.html";
        } catch (error) {
            console.error(error);
            alert("Error saving profile");
            btn.innerText = "Prawesh Karein";
            btn.classList.remove('loading');
        }
    };
</script>
</body>
</html>
