<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaap Leaderboard</title>
    <style>
        :root {
            --gold: #FFD700; --silver: #C0C0C0; --bronze: #CD7F32;
            --orange: #f38630; --bg: #120c08;
        }

        body {
            margin: 0; background-color: var(--bg); color: white;
            font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center;
        }

        .header { padding: 30px; text-align: center; }
        .header h1 { margin: 0; color: var(--orange); letter-spacing: 2px; }

        .leaderboard-container { width: 95%; max-width: 450px; margin-top: 20px; }

        .user-card {
            display: flex; align-items: center; background: rgba(255, 255, 255, 0.08);
            margin-bottom: 20px; padding: 15px; border-radius: 15px;
            position: relative; border: 1px solid rgba(255,255,255,0.1);
        }

        .profile-wrapper { 
            position: relative; 
            margin-right: 15px;
            padding-top: 10px; 
        }

        .crown {
            position: absolute;
            top: -18px; 
            left: 50%;
            transform: translateX(-50%) rotate(-10deg);
            font-size: 1.8rem;
            z-index: 10;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.8));
        }

        .profile-pic {
            width: 60px; height: 60px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            object-fit: cover;
            display: block;
            background: #222; /* Placeholder color */
        }

        .rank-1 .profile-pic { border-color: var(--gold); box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }
        .rank-2 .profile-pic { border-color: var(--silver); }
        .rank-3 .profile-pic { border-color: var(--bronze); }

        .rank-num { font-size: 1.2rem; font-weight: 800; width: 30px; color: rgba(255,255,255,0.5); }
        .user-info { flex: 1; }
        .user-name { font-size: 1.1rem; font-weight: 600; display: block; }
        .count-badge { background: var(--orange); padding: 5px 12px; border-radius: 8px; font-weight: bold; }

        .back-btn { margin: 20px; color: var(--orange); text-decoration: none; border: 1px solid; padding: 8px 20px; border-radius: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🏆 LEADERBOARD</h1>
    </div>

    <div class="leaderboard-container" id="leaderboardList">
        <p style="text-align:center; opacity:0.5;">Loading devotees...</p>
    </div>

    <a href="index.html" class="back-btn">Back to Jaap</a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArfXVNLQhYAspd2xmZuwLb7bxLaY8sQqY",
            authDomain: "jaap-fdd80.firebaseapp.com",
            projectId: "jaap-fdd80",
            storageBucket: "jaap-fdd80.firebasestorage.app",
            messagingSenderId: "375289521394",
            appId: "1:375289521394:web:ced2cafa4d1743d5ab9c6b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const q = query(collection(db, "users"), orderBy("totalCount", "desc"), limit(10));

        onSnapshot(q, (snapshot) => {
            const listDiv = document.getElementById('leaderboardList');
            listDiv.innerHTML = '';

            snapshot.docs.forEach((doc, index) => {
                const data = doc.data();
                const rank = index + 1;
                let crownEmoji = '';
                
                if(rank === 1) crownEmoji = '<div class="crown">👑</div>';
                else if(rank === 2) crownEmoji = '<div class="crown">🥈</div>';
                else if(rank === 3) crownEmoji = '<div class="crown">🥉</div>';

                // --- PHOTO FETCH LOGIC ---
                // Pehle Firebase ka profilePic check karega, agar nahi hai toh Avatar dikhayega
                const profileImg = data.profilePic ? data.profilePic : `https://ui-avatars.com/api/?name=${doc.id}&background=333&color=f38630&bold=true`;

                listDiv.innerHTML += `
                    <div class="user-card rank-${rank}">
                        <div class="rank-num">${rank}</div>
                        <div class="profile-wrapper">
                            ${crownEmoji}
                            <img src="${profileImg}" class="profile-pic" onerror="this.src='https://ui-avatars.com/api/?name=${doc.id}'">
                        </div>
                        <div class="user-info">
                            <span class="user-name">${doc.id}</span>
                            <span style="font-size:0.8rem; opacity:0.6">Total Jaap</span>
                        </div>
                        <div class="count-badge">${(data.totalCount || 0).toLocaleString()}</div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
