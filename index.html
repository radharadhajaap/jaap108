<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Radha Rani Jaap - Final</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #ff9f43; --divine: #ffcc33; --bg-base: #020100;
            --surface: rgba(255, 255, 255, 0.06); --border: rgba(255, 255, 255, 0.12);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Space Grotesk', sans-serif; background-color: var(--bg-base);
            color: white; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent;
        }

        /* Immersive Background */
        #bgLayer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center; z-index: -2;
            transition: 2s ease; filter: brightness(0.35) contrast(1.1);
        }

        .ambient-glow {
            position: fixed; bottom: -10%; left: 50%; transform: translateX(-50%);
            width: 140%; height: 50%; background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            opacity: 0.12; z-index: -1; filter: blur(60px);
        }

        /* Top Bar */
        .top-bar {
            position: fixed; top: 45px; width: 90%; left: 5%;
            display: flex; justify-content: space-between; z-index: 100;
        }
        .stat-chip {
            background: var(--surface); backdrop-filter: blur(20px);
            padding: 10px 16px; border-radius: 20px; border: 1px solid var(--border);
            font-size: 0.75rem; font-weight: 700; color: var(--divine);
        }

        /* Milestone Popup */
        .milestone {
            position: fixed; top: 20%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(135deg, var(--divine), var(--accent));
            padding: 20px 35px; border-radius: 30px; z-index: 1000; text-align: center;
            box-shadow: 0 0 40px rgba(255, 159, 67, 0.4); transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #000; pointer-events: none;
        }
        .milestone.active { transform: translate(-50%, -50%) scale(1); }

        /* Core Engine */
        .core { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .mantra {
            font-family: 'Outfit', sans-serif; font-size: 3.2rem; font-weight: 900;
            background: linear-gradient(180deg, #fff, var(--divine));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 20px; animation: breathe 5s infinite alternate ease-in-out;
        }
        @keyframes breathe { from { transform: scale(1); } to { transform: scale(1.05); } }

        .counter-wrap {
            position: relative; width: 320px; height: 320px;
            display: flex; align-items: center; justify-content: center; transition: 0.1s;
        }

        .main-num {
            font-family: 'Outfit', sans-serif; font-size: 8.5rem; line-height: 1;
            margin: 0; z-index: 10;
        }

        #ringInner { transition: stroke-dashoffset 0.4s ease, stroke 0.6s ease; }

        /* Insights Panel */
        .insights {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
            width: 85%; margin-top: 30px;
        }
        .i-card {
            background: var(--surface); border: 1px solid var(--border);
            padding: 15px; border-radius: 22px; text-align: center; backdrop-filter: blur(10px);
        }
        .i-label { font-size: 0.6rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .i-val { font-size: 1.1rem; font-weight: 700; color: #fff; margin-top: 4px; }

        /* Dock */
        .dock {
            position: fixed; bottom: 35px; width: 85%; left: 7.5%;
            background: rgba(15, 12, 10, 0.85); backdrop-filter: blur(30px);
            border: 1px solid var(--border); border-radius: 35px;
            display: flex; justify-content: space-around; padding: 18px 0; z-index: 100;
        }
        .dock-btn { color: #888; text-decoration: none; font-size: 0.65rem; font-weight: 700; text-align: center; }
        .dock-btn span { display: block; font-size: 1.8rem; margin-bottom: 5px; opacity: 0.6; }

        /* Sparks */
        .spark {
            position: absolute; pointer-events: none; width: 4px; height: 4px; background: #fff;
            border-radius: 50%; box-shadow: 0 0 10px var(--divine); animation: explode 0.7s forwards;
        }
        @keyframes explode { 0% { opacity: 1; } 100% { opacity: 0; transform: translate(var(--x), var(--y)) scale(0); } }
    </style>
</head>
<body onclick="handleGlobalTap(event)">

    <div id="bgLayer"></div>
    <div class="ambient-glow"></div>
    <audio id="bell" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

    <div id="milestoneAlert" class="milestone">
        <div style="font-size: 2rem;">🌟</div>
        <div style="font-weight: 900; font-size: 1.2rem;">DIVINE STEP</div>
        <div id="milestoneText">1,000 Jaap Completed</div>
    </div>

    <div class="top-bar">
        <div class="stat-chip" id="streakDisp">🔥 0 DAYS</div>
        <div class="stat-chip" id="totalDisp" style="color:#fff;">0 TOTAL</div>
    </div>

    <div class="core">
        <div class="mantra">Radha Radha</div>
        
        <div class="counter-wrap" id="scaleRef">
            <svg style="position:absolute; width: 110%; height:110%; transform: rotate(-90deg);">
                <circle cx="176" cy="176" r="158" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="2" />
                <circle id="ringInner" cx="176" cy="176" r="158" fill="none" stroke="url(#nGrad)" stroke-width="12" 
                stroke-dasharray="992" stroke-dashoffset="992" stroke-linecap="round" />
                <defs>
                    <linearGradient id="nGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="var(--accent)" />
                        <stop offset="100%" stop-color="var(--divine)" />
                    </linearGradient>
                </defs>
            </svg>
            <p class="main-num" id="dailyNum">0</p>
        </div>

        <div class="insights">
            <div class="i-card">
                <div class="i-label">Malas Done</div>
                <div class="i-val" id="malaVal">0.0</div>
            </div>
            <div class="i-card">
                <div class="i-label">Target</div>
                <div class="i-val" id="targetVal">No Goal</div>
            </div>
        </div>
    </div>

    <div class="dock">
        <div class="dock-btn" onclick="toggleSankalp()"><span>📜</span>SANKALP</div>
        <div class="dock-btn" onclick="location.href='darshan.html'"><span>🖼️</span>DARSHAN</div>
        <div class="dock-btn" onclick="location.href='leaderboard.html'"><span>🏆</span>RANK</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArfXVNLQhYAspd2xmZuwLb7bxLaY8sQqY",
            authDomain: "jaap-fdd80.firebaseapp.com",
            projectId: "jaap-fdd80",
            storageBucket: "jaap-fdd80.firebasestorage.app",
            messagingSenderId: "375289521394",
            appId: "1:375289521394:web:ced2cafa4d1743d5ab9c6b"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const user = localStorage.getItem('jaapUserName');
        const today = new Date().toLocaleDateString();

        if(!user) location.href = "login.html";

        const bgImages = [
            "https://images.unsplash.com/photo-1544924222-355b1f0ad5a7?q=80&w=1200",
            "https://images.unsplash.com/photo-1620121692029-d088224efc74?q=80&w=1200",
            "https://images.unsplash.com/photo-1616013050162-4f366e6b6680?q=80&w=1200"
        ];

        function updateSystem(val, total) {
            // Ring Calc
            const offset = 992 - (val % 108 / 108) * 992;
            const ring = document.getElementById('ringInner');
            ring.style.strokeDashoffset = offset;
            
            // Dynamic Color
            if(val >= 108) ring.style.stroke = "var(--divine)";
            else ring.style.stroke = "url(#nGrad)";

            // Insights
            document.getElementById('malaVal').innerText = (val / 108).toFixed(1);
            
            // BG Image Shift
            const idx = (new Date().getDate() + Math.floor(val / 108)) % bgImages.length;
            document.getElementById('bgLayer').style.backgroundImage = `url('${bgImages[idx]}')`;

            // Milestone logic
            if(total > 0 && total % 1000 === 0) {
                const pop = document.getElementById('milestoneAlert');
                document.getElementById('milestoneText').innerText = `${total.toLocaleString()} Jaap Completed`;
                pop.classList.add('active');
                setTimeout(() => pop.classList.remove('active'), 3500);
            }

            // Mala Celebration
            if(val > 0 && val % 108 === 0) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 }, colors: ['#ffcc33', '#ff9f43'] });
                document.getElementById('bell').play();
            }
        }

        onSnapshot(doc(db, "users", user), (snap) => {
            if(snap.exists()) {
                const d = snap.data();
                const daily = d.lastDate === today ? d.dailyCount : 0;
                document.getElementById('dailyNum').innerText = daily;
                document.getElementById('totalDisp').innerText = `${(d.totalCount || 0).toLocaleString()} TOTAL`;
                document.getElementById('streakDisp').innerText = `🔥 ${d.streak || 0} DAYS`;
                
                if(d.sankalpGoal && d.sankalpDate === today) {
                    document.getElementById('targetVal').innerText = `${daily}/${d.sankalpGoal}`;
                }
                updateSystem(daily, d.totalCount);
            }
        });

        let lastTap = 0;
        window.handleGlobalTap = async (e) => {
            if(e.target.closest('.dock') || e.target.closest('.milestone')) return;
            
            const now = Date.now();
            if(now - lastTap < 100) return; // Throttle
            lastTap = now;

            const ref = document.getElementById('scaleRef');
            ref.style.transform = 'scale(0.95)';
            setTimeout(() => ref.style.transform = 'scale(1)', 100);

            for(let i=0; i<5; i++) {
                const s = document.createElement('div');
                s.className = 'spark';
                s.style.left = e.clientX + 'px'; s.style.top = e.clientY + 'px';
                s.style.setProperty('--x', (Math.random() - 0.5) * 180 + 'px');
                s.style.setProperty('--y', (Math.random() - 0.5) * 180 + 'px');
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 700);
            }

            if(navigator.vibrate) navigator.vibrate(40);
            await setDoc(doc(db, "users", user), { 
                dailyCount: increment(1), totalCount: increment(1), 
                lastDate: today, lastTimestamp: now 
            }, { merge: true });
        };
    </script>
</body>
</html>
