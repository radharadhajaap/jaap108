<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radha Radha Jaap v13.0</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #FFD700; --orange: #FF8C00; --bg: #050301;
            --glass: rgba(255, 255, 255, 0.07); --border: rgba(255, 255, 255, 0.12);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Outfit', sans-serif; background: var(--bg);
            color: white; overflow: hidden; user-select: none;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }

        /* Top Navigation */
        .top-nav {
            position: fixed; top: 50px; width: 90%; left: 5%;
            display: flex; justify-content: space-between; z-index: 100;
        }
        .chip {
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border);
            font-size: 0.75rem; font-weight: 700; color: var(--gold);
        }

        /* Center Display */
        .main-stage {
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .mantra-text {
            font-size: 1.2rem; letter-spacing: 10px; font-weight: 300;
            text-transform: uppercase; color: var(--gold); margin-bottom: 20px;
        }
        .count-display {
            font-size: 10rem; font-weight: 900; margin: 0;
            background: linear-gradient(#fff, var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Bottom Footer (Fixing your icons) */
        .bottom-shelf {
            position: fixed; bottom: 0; width: 100%; padding-bottom: 40px;
            background: linear-gradient(transparent, #000 70%); z-index: 50;
        }
        .stats-row {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
            width: 88%; margin: 0 auto 25px;
        }
        .card {
            background: var(--glass); border: 1px solid var(--border);
            padding: 15px; border-radius: 22px; text-align: center;
        }
        .card-label { font-size: 0.6rem; color: #888; text-transform: uppercase; }
        .card-val { font-size: 1.2rem; font-weight: 700; }

        .dock {
            width: 85%; margin: 0 auto; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); border-radius: 35px;
            display: flex; justify-content: space-around; padding: 15px 0;
        }
        .dock-item { font-size: 1.5rem; cursor: pointer; transition: 0.2s; }
        .dock-item:active { transform: scale(0.8); opacity: 0.5; }
    </style>
</head>
<body onpointerdown="handleTap(event)">

    <audio id="bell" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

    <div class="top-nav">
        <div class="chip" id="streakDisp">🔥 0 DAYS</div>
        <div class="chip" id="totalDisp">0 TOTAL</div>
    </div>

    <div class="main-stage">
        <div class="mantra-text">RADHA RADHA</div>
        <h1 class="count-display" id="mainNum">0</h1>
    </div>

    <div class="bottom-shelf">
        <div class="stats-row">
            <div class="card">
                <div class="card-label">Mala Count</div>
                <div class="card-val" id="malaVal">0.0</div>
            </div>
            <div class="card">
                <div class="card-label">Session Target</div>
                <div class="card-val" id="targetVal">108</div>
            </div>
        </div>
        
        <nav class="dock">
            <div class="dock-item" onclick="openSankalp()">📜</div>
            <div class="dock-item" onclick="location.href='darshan.html'">🖼️</div>
            <div class="dock-item" onclick="location.href='leaderboard.html'">🏆</div>
            <div class="dock-item" onclick="openSettings()">⚙️</div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArfXVNLQhYAspd2xmZuwLb7bxLaY8sQqY",
            authDomain: "jaap-fdd80.firebaseapp.com",
            projectId: "jaap-fdd80",
            storageBucket: "jaap-fdd80.firebasestorage.app",
            messagingSenderId: "375289521394",
            appId: "1:375289521394:web:ced2cafa4d1743d5ab9c6b"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const user = localStorage.getItem('jaapUserName') || "Guest";
        const today = new Date().toLocaleDateString();

        let localCount = 0;

        // 1. DATA SYNC
        onSnapshot(doc(db, "users", user), (snap) => {
            if(snap.exists()){
                const d = snap.data();
                localCount = d.lastDate === today ? d.dailyCount : 0;
                document.getElementById('mainNum').innerText = localCount;
                document.getElementById('malaVal').innerText = (localCount / 108).toFixed(1);
                document.getElementById('totalDisp').innerText = `${(d.totalCount || 0).toLocaleString()} TOTAL`;
                document.getElementById('streakDisp').innerText = `🔥 ${d.streak || 0} DAYS`;
                if(d.sankalpGoal) document.getElementById('targetVal').innerText = d.sankalpGoal;
            }
        });

        // 2. TAP LOGIC
        window.handleTap = async (e) => {
            if(e.target.closest('.dock')) return;
            
            localCount++;
            if(navigator.vibrate) navigator.vibrate(40);
            if(localCount % 108 === 0) {
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 } });
                document.getElementById('bell').play();
            }

            await setDoc(doc(db, "users", user), {
                dailyCount: increment(1),
                totalCount: increment(1),
                lastDate: today
            }, { merge: true });
        };

        // 3. NAVIGATION FUNCTIONS
        window.openSankalp = () => {
            const goal = prompt("Apna Target (Sankalp) likhein:", "108");
            if(goal) {
                setDoc(doc(db, "users", user), { sankalpGoal: parseInt(goal) }, { merge: true });
                alert("Jai Ho! Sankalp set ho gaya.");
            }
        };

        window.openSettings = () => {
            alert("Settings Update: Jald hi naye sounds aur themes aane wale hain!");
        };
    </script>
</body>
</html>
