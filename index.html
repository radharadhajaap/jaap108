<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radha Radha Jaap v14.0 - Mystic Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #FFD700; --orange: #FF8C00; --bg: #050301;
            --glass: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.15);
            --brahma-color: #8A2BE2;
        }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Outfit', sans-serif; background: var(--bg);
            color: white; overflow: hidden; user-select: none;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }
        #parallax-bg {
            position: fixed; top: -10%; left: -10%; width: 120%; height: 120%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1616013050162-4f366e6b6680?q=80&w=1200');
            background-size: cover; background-position: center;
            z-index: -3; transition: transform 0.1s ease-out;
        }
        .energy-rail { position: fixed; left: 0; bottom: 0; width: 6px; height: 100%; background: rgba(255,255,255,0.05); z-index: 1000; }
        #energy-level { width: 100%; height: 0%; background: var(--gold); box-shadow: 0 0 20px var(--gold); transition: height 0.4s ease; }
        .top-nav { position: fixed; top: 50px; width: 90%; left: 5%; display: flex; justify-content: space-between; z-index: 100; }
        .chip { background: var(--glass); backdrop-filter: blur(25px); padding: 10px 18px; border-radius: 25px; border: 1px solid var(--border); font-size: 0.8rem; font-weight: 700; color: var(--gold); }
        .main-stage { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .mantra-text { font-size: 1.3rem; letter-spacing: 12px; font-weight: 300; text-transform: uppercase; color: var(--gold); margin-bottom: 25px; opacity: 0.8; }
        .count-display { font-size: 11rem; font-weight: 900; margin: 0; background: linear-gradient(#fff, #999); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; letter-spacing: -5px; }
        .bottom-shelf { position: fixed; bottom: 0; width: 100%; padding-bottom: 40px; background: linear-gradient(transparent, #000 80%); z-index: 50; }
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; margin: 0 auto 25px; }
        .card { background: var(--glass); border: 1px solid var(--border); padding: 18px; border-radius: 25px; text-align: center; backdrop-filter: blur(15px); }
        .card-label { font-size: 0.65rem; color: #777; text-transform: uppercase; letter-spacing: 1px; }
        .card-val { font-size: 1.3rem; font-weight: 700; margin-top: 5px; }
        .dock { width: 88%; margin: 0 auto; background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 40px; display: flex; justify-content: space-around; padding: 18px 0; backdrop-filter: blur(20px); }
        .dock-item { font-size: 1.6rem; cursor: pointer; transition: 0.3s; opacity: 0.7; }
    </style>
</head>
<body onpointerdown="handleMysticTap(event)">

    <div id="parallax-bg"></div>
    <div class="energy-rail"><div id="energy-level"></div></div>
    <audio id="bell" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

    <div class="top-nav">
        <div class="chip" id="streakDisp">🔥 0 DAYS</div>
        <div class="chip" id="totalDisp">0 TOTAL</div>
    </div>

    <div class="main-stage">
        <div class="mantra-text" id="mantra">RADHA RADHA</div>
        <h1 class="count-display" id="mainNum">0</h1>
    </div>

    <div class="bottom-shelf">
        <div class="stats-row">
            <div class="card">
                <div class="card-label">MALA COUNT</div>
                <div class="card-val" id="malaVal">0.0</div>
            </div>
            <div class="card">
                <div class="card-label">SESSION TARGET</div>
                <div class="card-val" id="targetVal">108</div>
            </div>
        </div>
        <nav class="dock">
            <div class="dock-item" onclick="openSankalp()">📜</div>
            <div class="dock-item" onclick="location.href='darshan.html'">🖼️</div>
            <div class="dock-item" onclick="location.href='leaderboard.html'">🏆</div>
            <div class="dock-item" onclick="openSettings()">⚙️</div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArfXVNLQhYAspd2xmZuwLb7bxLaY8sQqY",
            authDomain: "jaap-fdd80.firebaseapp.com",
            projectId: "jaap-fdd80",
            storageBucket: "jaap-fdd80.firebasestorage.app",
            messagingSenderId: "375289521394",
            appId: "1:375289521394:web:ced2cafa4d1743d5ab9c6b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const messaging = getMessaging(app);

        const user = localStorage.getItem('jaapUserName') || "Guest";
        const today = new Date().toLocaleDateString();
        let count = 0, energy = 0;

        // --- Notification Setup ---
        async function initNotifications() {
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    const token = await getToken(messaging, { 
                        vapidKey: 'BLi8nbJsxFe7lbmXfV3R1NSIyv1pUWf-xvYsDa34Lo-fvGjdCjb1d-yZBvpW3gppMdI-r3MfbU67atPBr9V8KNk' 
                    });
                    if (token) {
                        await setDoc(doc(db, "users", user), { fcmToken: token }, { merge: true });
                        console.log("Token saved");
                    }
                }
            } catch (err) { console.log("Notify Error:", err); }
        }
        initNotifications();

        // --- Jaap Logic ---
        onSnapshot(doc(db, "users", user), (snap) => {
            if(snap.exists()){
                const d = snap.data();
                count = d.lastDate === today ? d.dailyCount : 0;
                document.getElementById('mainNum').innerText = count;
                document.getElementById('malaVal').innerText = (count / 108).toFixed(1);
                document.getElementById('totalDisp').innerText = `${(d.totalCount || 0).toLocaleString()} TOTAL`;
                document.getElementById('streakDisp').innerText = `🔥 ${d.streak || 0} DAYS`;
            }
        });

        window.handleMysticTap = async (e) => {
            if(e.target.closest('.dock')) return;
            count++; energy = Math.min(energy + 2, 100);
            document.getElementById('energy-level').style.height = energy + "%";
            if(navigator.vibrate) navigator.vibrate(45);
            if(count % 108 === 0) {
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.7 }, colors: ['#FFD700', '#FF8C00'] });
                document.getElementById('bell').play();
            }
            await setDoc(doc(db, "users", user), { dailyCount: increment(1), totalCount: increment(1), lastDate: today }, { merge: true });
        };

        setInterval(() => { energy = Math.max(energy - 0.5, 0); document.getElementById('energy-level').style.height = energy + "%"; }, 1000);
        window.openSankalp = () => prompt("Apna aaj ka Sankalp set karein:", "108");
        window.openSettings = () => alert("Mystic Mode: Active");
    </script>
</body>
</html>
