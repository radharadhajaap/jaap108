<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Radha Rani Jaap - V4.0</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --orange: #f38630; 
            --gold: #ffcc33;
            --deep-bg: #050301;
            --glass: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--deep-bg); color: white; overflow: hidden;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        /* Dynamic Parallax Background */
        #darshanBg {
            position: fixed; top: -5%; left: -5%; width: 110%; height: 110%;
            background-size: cover; background-position: center;
            z-index: -2; transition: filter 2s ease, transform 0.5s ease-out;
            filter: brightness(0.35) blur(2px);
        }

        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 30%, var(--deep-bg) 110%);
            z-index: -1;
        }

        /* Top Bar */
        .top-bar {
            position: fixed; top: 50px; width: 90%; left: 5%;
            display: flex; justify-content: space-between; z-index: 100;
        }
        .stat-pill {
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 10px 16px; border-radius: 20px; border: 1px solid var(--border);
            font-size: 0.7rem; font-weight: 800; color: var(--gold); letter-spacing: 1px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        /* Main Engine */
        .container { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .mantra-text { 
            font-family: 'Montserrat', sans-serif;
            font-size: 3.8rem; font-weight: 900; 
            background: linear-gradient(to bottom, #fff 40%, var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px; filter: drop-shadow(0 0 20px rgba(243,134,48,0.5));
            letter-spacing: -2px;
        }

        .counter-circle {
            position: relative; width: 320px; height: 320px;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .count-display { 
            font-size: 9rem; font-weight: 900; margin: 0; 
            z-index: 10; font-family: 'Montserrat', sans-serif;
            color: white; opacity: 0.95;
        }

        /* Pulse Ring */
        #ring { transition: stroke-dashoffset 0.3s ease; filter: drop-shadow(0 0 8px var(--orange)); }

        /* Sankalp Progress View */
        .progress-card {
            margin-top: 30px; background: var(--glass); padding: 12px 25px;
            border-radius: 20px; border: 1px solid var(--border);
            text-align: center; width: 200px;
        }
        .progress-bar-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 8px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--gold); transition: width 0.6s ease; box-shadow: 0 0 10px var(--gold); }

        /* Navigation Dock */
        .bottom-dock {
            position: fixed; bottom: 35px; width: 90%; left: 5%;
            background: rgba(15, 12, 10, 0.8); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: 30px;
            display: flex; justify-content: space-around; padding: 15px 0;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); z-index: 100;
        }
        .dock-btn { color: #aaa; text-decoration: none; font-size: 0.65rem; font-weight: 700; text-align: center; }
        .dock-btn span { display: block; font-size: 1.6rem; margin-bottom: 4px; filter: saturate(0.5); }
        .dock-btn:active { transform: scale(0.85); color: var(--gold); }

        /* Particle Spark */
        .sparkle {
            position: absolute; pointer-events: none; width: 6px; height: 6px;
            background: var(--gold); border-radius: 50%;
            animation: explode 0.8s ease-out forwards;
        }
        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body onclick="processJaap(event)">

    <div id="darshanBg"></div>
    <div class="bg-overlay"></div>
    <audio id="bell" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" preload="auto"></audio>

    <div class="top-bar">
        <div class="stat-pill" id="streakDisp">🔥 0 DAYS</div>
        <div class="stat-pill" id="totalDisp" style="color:#fff;">0 JAAP</div>
    </div>

    <div class="container">
        <div class="mantra-text">Radha Radha</div>
        
        <div class="counter-circle" id="circleWrapper">
            <svg style="position:absolute; width: 100%; height:100%; transform: rotate(-90deg);">
                <circle cx="160" cy="160" r="150" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="2" />
                <circle id="ring" cx="160" cy="160" r="150" fill="none" stroke="url(#grad)" stroke-width="10" 
                stroke-dasharray="942" stroke-dashoffset="942" stroke-linecap="round" />
                <defs>
                    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#f38630" />
                        <stop offset="100%" stop-color="#ffcc33" />
                    </linearGradient>
                </defs>
            </svg>
            <p class="count-display" id="dailyNum">0</p>
        </div>

        <div class="progress-card" id="sankalpBox" style="display:none;">
            <div style="font-size: 0.6rem; color: var(--gold); letter-spacing: 2px; font-weight: 800;">MISSION PROGRESS</div>
            <div style="font-size: 1.1rem; font-weight: 600; margin-top: 2px;" id="sankalpText">0 / 0</div>
            <div class="progress-bar-bg"><div class="progress-fill" id="pBar"></div></div>
        </div>
    </div>

    <div class="bottom-dock">
        <div class="dock-btn" onclick="toggleSankalp(true)"><span>📜</span>SANKALP</div>
        <div class="dock-btn" onclick="location.href='darshan.html'"><span>🖼️</span>DARSHAN</div>
        <div class="dock-btn" onclick="location.href='leaderboard.html'"><span>🏆</span>RANK</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArfXVNLQhYAspd2xmZuwLb7bxLaY8sQqY",
            authDomain: "jaap-fdd80.firebaseapp.com",
            projectId: "jaap-fdd80",
            storageBucket: "jaap-fdd80.firebasestorage.app",
            messagingSenderId: "375289521394",
            appId: "1:375289521394:web:ced2cafa4d1743d5ab9c6b"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const user = localStorage.getItem('jaapUserName');
        const today = new Date().toLocaleDateString();

        if(!user) location.href = "login.html";

        const bgImages = [
            "https://images.unsplash.com/photo-1544924222-355b1f0ad5a7?q=80&w=1200",
            "https://images.unsplash.com/photo-1620121692029-d088224efc74?q=80&w=1200",
            "https://images.unsplash.com/photo-1616013050162-4f366e6b6680?q=80&w=1200"
        ];

        function refreshUI(daily) {
            // Circle circumference (r=150) = 942
            const offset = 942 - (daily % 108 / 108) * 942;
            document.getElementById('ring').style.strokeDashoffset = offset;

            const idx = (new Date().getDate() + Math.floor(daily / 108)) % bgImages.length;
            document.getElementById('darshanBg').style.backgroundImage = `url('${bgImages[idx]}')`;

            if(daily > 0 && daily % 108 === 0) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ffcc33', '#f38630'] });
                document.getElementById('bell').play();
            }
        }

        onSnapshot(doc(db, "users", user), (snap) => {
            if(snap.exists()) {
                const data = snap.data();
                const daily = data.lastDate === today ? data.dailyCount : 0;
                document.getElementById('dailyNum').innerText = daily;
                document.getElementById('totalDisp').innerText = `${(data.totalCount || 0).toLocaleString()} JAAP`;
                document.getElementById('streakDisp').innerText = `🔥 ${data.streak || 0} DAYS`;
                refreshUI(daily);

                if(data.sankalpGoal && data.sankalpDate === today) {
                    document.getElementById('sankalpBox').style.display = 'block';
                    document.getElementById('sankalpText').innerText = `${daily} / ${data.sankalpGoal}`;
                    document.getElementById('pBar').style.width = Math.min((daily/data.sankalpGoal)*100, 100) + "%";
                }
            }
        });

        let lastTap = 0;
        window.processJaap = async (e) => {
            if(e.target.closest('.bottom-dock')) return;
            
            // Fast tap prevention (100ms)
            const now = Date.now();
            if(now - lastTap < 100) return;
            lastTap = now;

            // Visual Haptics
            const wrapper = document.getElementById('circleWrapper');
            wrapper.style.transform = 'scale(0.95)';
            setTimeout(() => wrapper.style.transform = 'scale(1)', 100);

            // Particles
            for(let i=0; i<5; i++) {
                const s = document.createElement('div');
                s.className = 'sparkle';
                s.style.left = e.clientX + 'px';
                s.style.top = e.clientY + 'px';
                s.style.setProperty('--x', (Math.random() - 0.5) * 200 + 'px');
                s.style.setProperty('--y', (Math.random() - 0.5) * 200 + 'px');
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 800);
            }

            if(navigator.vibrate) navigator.vibrate(40);

            await setDoc(doc(db, "users", user), { 
                dailyCount: increment(1), 
                totalCount: increment(1), 
                lastDate: today, 
                lastTimestamp: now 
            }, { merge: true });
        };
    </script>
</body>
</html>
