<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radha Rani Jaap - Titanium V8</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #FFD700; --bg: #020100; }
        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: 'Outfit', sans-serif; overflow: hidden;
            touch-action: manipulation; /* Improves tap latency on mobile */
        }

        /* Hardware Accelerated Layer */
        .layer-gpu { transform: translateZ(0); backface-visibility: hidden; }

        .container { 
            height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
        }

        .counter-ring {
            position: relative; width: 350px; height: 350px;
            will-change: transform; /* Tells browser to optimize for movement */
        }

        .count-num {
            font-size: 11rem; font-weight: 900; margin: 0;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(to bottom, #fff, var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        #progressRing {
            transition: stroke-dashoffset 0.25s linear; /* Faster, linear response */
            stroke: var(--gold);
        }

        /* Performance Badge */
        .perf-status {
            position: fixed; top: 15px; right: 15px;
            font-size: 10px; opacity: 0.4; letter-spacing: 1px;
        }
    </style>
</head>
<body onclick="handlePerformanceTap(event)">

    <div class="perf-status">TITANIUM ENGINE ACTIVE • 120FPS</div>

    <div class="container layer-gpu">
        <div class="counter-ring" id="ringBox">
            <svg width="350" height="350">
                <circle cx="175" cy="175" r="160" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="4" />
                <circle id="progressRing" cx="175" cy="175" r="160" fill="none" 
                        stroke-width="12" stroke-dasharray="1005" stroke-dashoffset="1005" 
                        stroke-linecap="round" transform="rotate(-90 175 175)" />
            </svg>
            <h1 class="count-num" id="displayNum">0</h1>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Performance Config
        const firebaseConfig = { /* Your Config */ };
        const db = getFirestore(initializeApp(firebaseConfig));
        const user = localStorage.getItem('jaapUserName');
        
        let localCount = 0;
        let pendingUpdates = 0;
        let syncTimeout = null;

        // Optimized UI Update Function
        function updateUIRender(val) {
            const display = document.getElementById('displayNum');
            const ring = document.getElementById('progressRing');
            
            // 1. Text Update
            display.innerText = val;

            // 2. Ring Animation (Math Optimized)
            const offset = 1005 - (val % 108 / 108) * 1005;
            ring.style.strokeDashoffset = offset;

            // 3. Visual Feedback (Haptic feel)
            const box = document.getElementById('ringBox');
            box.style.transform = 'scale(0.97)';
            setTimeout(() => box.style.transform = 'scale(1)', 50);
        }

        // Performance Tapping Logic
        window.handlePerformanceTap = (e) => {
            localCount++;
            pendingUpdates++;
            
            // Instant Visual Response (No delay)
            updateUIRender(localCount);

            if(navigator.vibrate) navigator.vibrate(30);

            // Debounced Sync (Database ko 2 second baad bhejta hai)
            clearTimeout(syncTimeout);
            syncTimeout = setTimeout(async () => {
                const updateRef = doc(db, "users", user);
                try {
                    await updateDoc(updateRef, {
                        dailyCount: increment(pendingUpdates),
                        totalCount: increment(pendingUpdates)
                    });
                    pendingUpdates = 0; // Reset after success
                    console.log("Sync Complete");
                } catch (err) {
                    console.error("Sync Failed, will retry");
                }
            }, 2000); 
        };
    </script>
</body>
</html>
