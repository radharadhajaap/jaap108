<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Radha Rani Jaap Pro</title>
    <style>
        :root { --orange: #f38630; --glass: rgba(255, 255, 255, 0.1); }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: #0d0905; color: white; overflow: hidden;
        }

        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            z-index: -1; transition: background-image 1.5s ease-in-out;
        }

        .top-nav {
            position: fixed; top: 20px; width: 100%; display: flex;
            justify-content: space-evenly; padding: 0 10px; z-index: 100;
        }
        .nav-btn {
            background: var(--glass); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 10px 18px; border-radius: 50px; color: white; font-size: 0.8rem;
            text-decoration: none; cursor: pointer; display: flex; align-items: center; gap: 8px;
        }

        /* Sankalp UI */
        .sankalp-box {
            position: fixed; top: 85px; width: 90%; left: 5%;
            background: rgba(0, 0, 0, 0.6); border-radius: 15px;
            padding: 12px; border: 1px solid rgba(243, 134, 48, 0.3);
            text-align: center; z-index: 90;
        }
        .sankalp-progress { height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 8px; overflow: hidden; }
        .sankalp-fill { height: 100%; background: linear-gradient(90deg, #4caf50, #8bc34a); width: 0%; transition: 1s; }

        .main-content { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .mantra-text { font-size: 2.2rem; font-weight: bold; text-shadow: 0 0 20px rgba(243, 134, 48, 0.8); }

        .mala-circle { position: relative; width: 260px; height: 260px; margin: 20px auto; display: flex; align-items: center; justify-content: center; }
        .mala-svg { position: absolute; width: 100%; height: 100%; transform: rotate(-90deg); transition: 0.4s; }
        
        .daily-num { font-size: 5rem; font-weight: 800; line-height: 1; margin: 0; }
        .float-text { position: absolute; color: #ffcc33; font-weight: bold; pointer-events: none; animation: floatUp 0.8s forwards; font-size: 1.5rem; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }

        /* Sankalp Modal */
        #sankalpModal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(20, 15, 10, 0.95); padding: 30px; border-radius: 20px;
            border: 1px solid var(--orange); z-index: 1000; width: 80%; text-align: center;
        }
        .modal-input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid #444; background: #000; color: white; text-align: center; }
    </style>
</head>
<body onclick="handleTap(event)">

    <div class="bg-container" id="dailyDarshanBg"></div>
    <audio id="bellSound"><source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

    <div class="top-nav">
        <div class="nav-btn" onclick="openSankalp(event)"><span>📜</span> Sankalp</div>
        <a href="leaderboard.html" class="nav-btn"><span>🏆</span> Rank</a>
    </div>

    <div class="sankalp-box" id="sankalpDisplay" style="display:none;">
        <div style="font-size: 0.75rem; color: #ffcc33; margin-bottom: 5px;">
            🙏 Sankalp Progress: <span id="sankalpCurrent">0</span> / <span id="sankalpGoal">0</span>
        </div>
        <div class="sankalp-progress"><div class="sankalp-fill" id="sankalpFill"></div></div>
    </div>

    <div class="main-content">
        <div id="streakDisplay" style="color:#ffeb3b; font-size: 1rem; margin-bottom: 10px;">🔥 0 Day Streak</div>
        <div class="mantra-text">Radha Radha</div>
        
        <div class="mala-circle">
            <svg class="mala-svg" id="malaSvg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
                <circle id="progressCircle" cx="50" cy="50" r="45" fill="none" stroke="#f38630" stroke-width="3" stroke-dasharray="282.7" stroke-dashoffset="282.7" />
            </svg>
            <div style="position:relative; z-index:10;">
                <p class="daily-num" id="dailyDisplay">0</p>
                <p style="font-size: 0.7rem; letter-spacing: 2px; margin: 0; color: var(--orange);">DAILY JAAP</p>
            </div>
        </div>

        <div style="margin-top: 20px; opacity: 0.8; font-size: 0.9rem;">
            MY TOTAL: <b id="totalDisplay" style="color:var(--orange)">0</b>
        </div>
    </div>

    <div id="sankalpModal">
        <h3 style="color:var(--orange)">Aaj ka Sankalp</h3>
        <p style="font-size:0.8rem; opacity:0.8;">Aap aaj kitni mala (1 mala = 108 jaap) karne ka sankalp lete hain?</p>
        <input type="number" id="malaInput" class="modal-input" placeholder="Enter number of Malas">
        <button onclick="setSankalp()" style="background:var(--orange); border:none; padding:12px 25px; border-radius:10px; color:white; font-weight:bold;">Sankalp Lein 🙏</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArfXVNLQhYAspd2xmZuwLb7bxLaY8sQqY",
            authDomain: "jaap-fdd80.firebaseapp.com",
            projectId: "jaap-fdd80",
            storageBucket: "jaap-fdd80.firebasestorage.app",
            messagingSenderId: "375289521394",
            appId: "1:375289521394:web:ced2cafa4d1743d5ab9c6b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userName = localStorage.getItem('jaapUserName');
        const today = new Date().toLocaleDateString();

        let rotation = 0;
        let userSankalp = 0;

        const darshanImages = [
            "https://images.unsplash.com/photo-1620121692029-d088224efc74?q=80&w=1932",
            "https://images.unsplash.com/photo-1544924222-355b1f0ad5a7?q=80&w=1932",
            "https://images.unsplash.com/photo-1506191696232-49195305149b?q=80&w=1932"
        ];

        function init() {
            // Set Daily Darshan
            const dayIdx = new Date().getDate() % darshanImages.length;
            document.getElementById('dailyDarshanBg').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)), url('${darshanImages[dayIdx]}')`;

            // Load Data
            onSnapshot(doc(db, "users", userName), (ds) => {
                if(ds.exists()) {
                    const d = ds.data();
                    const daily = d.lastDate === today ? d.dailyCount : 0;
                    document.getElementById('dailyDisplay').innerText = daily;
                    document.getElementById('totalDisplay').innerText = d.totalCount;
                    document.getElementById('streakDisplay').innerText = `🔥 ${d.streak || 0} Day Streak`;
                    
                    document.getElementById('progressCircle').style.strokeDashoffset = 282.7 - (daily % 108 / 108) * 282.7;

                    // Update Sankalp UI
                    if(d.sankalpGoal && d.sankalpDate === today) {
                        document.getElementById('sankalpDisplay').style.display = 'block';
                        document.getElementById('sankalpGoal').innerText = d.sankalpGoal;
                        document.getElementById('sankalpCurrent').innerText = daily;
                        const progress = Math.min((daily / d.sankalpGoal) * 100, 100);
                        document.getElementById('sankalpFill').style.width = progress + "%";
                        if(daily >= d.sankalpGoal && d.sankalpGoal > 0) {
                            document.getElementById('sankalpCurrent').innerText = "DONE! ✨";
                        }
                    }
                }
            });
        }

        window.openSankalp = (e) => { e.stopPropagation(); document.getElementById('sankalpModal').style.display = 'block'; };

        window.setSankalp = async () => {
            const malas = document.getElementById('malaInput').value;
            if(!malas || malas <= 0) return alert("Please enter valid number of malas.");
            const goal = malas * 108;
            await setDoc(doc(db, "users", userName), { sankalpGoal: goal, sankalpDate: today }, { merge: true });
            document.getElementById('sankalpModal').style.display = 'none';
        };

        window.handleTap = async (e) => {
            if(e.target.closest('.nav-btn') || e.target.closest('#sankalpModal')) return;

            rotation += (360 / 108);
            document.getElementById('malaSvg').style.transform = `rotate(${rotation - 90}deg)`;

            const f = document.createElement('div'); f.className = 'float-text'; f.innerText = 'Radhe';
            f.style.left = e.clientX + 'px'; f.style.top = e.clientY + 'px';
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 800);

            await setDoc(doc(db, "users", userName), { dailyCount: increment(1), totalCount: increment(1), lastDate: today, lastTimestamp: Date.now() }, { merge: true });

            if((parseInt(document.getElementById('dailyDisplay').innerText) + 1) % 108 === 0) {
                document.getElementById('bellSound').play();
            }
            if(navigator.vibrate) navigator.vibrate(40);
        };

        init();
    </script>
</body>
</html>
