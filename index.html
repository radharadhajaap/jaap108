<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Radha Rani Jaap - Final</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;900&display=swap" rel="stylesheet">
    
  <style>
    :root { 
        --orange: #f38630; 
        --gold: #ffcc33;
        --deep-bg: #050301;
        --glass: rgba(255, 255, 255, 0.08);
        --glass-border: rgba(255, 255, 255, 0.12);
        --glow: rgba(243, 134, 48, 0.3);
    }

    body, html { 
        margin: 0; padding: 0; width: 100%; height: 100%; 
        font-family: 'Poppins', sans-serif; 
        background-color: var(--deep-bg); color: white; overflow: hidden;
        user-select: none; -webkit-tap-highlight-color: transparent;
    }

    /* Animated Background Layer */
    #darshanBg {
        position: fixed; top: -5%; left: -5%; width: 110%; height: 110%;
        background-size: cover; background-position: center;
        z-index: -2; transition: all 1.5s ease;
        filter: brightness(0.5) saturate(1.2);
    }

    .bg-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle at 50% 50%, transparent 20%, var(--deep-bg) 110%);
        z-index: -1;
    }

    /* Premium Chips */
    .status-container {
        position: fixed; top: 45px; width: 90%; left: 5%;
        display: flex; justify-content: space-between; z-index: 100;
    }
    .chip {
        background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
        padding: 12px 20px; border-radius: 24px; border: 1px solid var(--glass-border);
        font-size: 0.7rem; font-weight: 700; color: var(--gold); letter-spacing: 1.5px;
        box-shadow: inset 0 0 10px rgba(255,255,255,0.05), 0 10px 25px rgba(0,0,0,0.4);
        text-transform: uppercase;
    }

    /* Main Engine */
    .main { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    
    .mantra-container {
        text-align: center; margin-bottom: 30px;
        animation: float 6s infinite ease-in-out;
    }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    .mantra { 
        font-size: 3.2rem; font-weight: 900; letter-spacing: -1px;
        background: linear-gradient(180deg, #fff 0%, var(--gold) 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 25px var(--glow));
    }

    .counter-view {
        position: relative; width: 320px; height: 320px;
        display: flex; align-items: center; justify-content: center;
    }

    .daily-num { 
        font-size: 8.5rem; font-weight: 900; line-height: 1; margin: 0; 
        z-index: 10; font-family: 'Inter', sans-serif;
        background: linear-gradient(to bottom, #fff, #888);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* Progress Info Card */
    .info-card {
        margin-top: 50px; background: var(--glass); padding: 15px 30px;
        border-radius: 20px; border: 1px solid var(--glass-border);
        backdrop-filter: blur(15px); text-align: center;
        box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    }
    .info-label { font-size: 0.6rem; color: var(--orange); font-weight: 800; letter-spacing: 2px; }
    .info-val { font-size: 1.1rem; font-weight: 600; color: #fff; }

    /* Dock Update */
    .dock {
        position: fixed; bottom: 35px; width: 88%; left: 6%;
        background: rgba(15, 10, 5, 0.85); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
        border: 1px solid var(--glass-border); border-radius: 30px;
        display: flex; justify-content: space-around; padding: 18px 10px;
        box-shadow: 0 -10px 40px rgba(0,0,0,0.5); z-index: 100;
    }
    .dock-item { color: #888; text-decoration: none; font-size: 0.65rem; text-align: center; font-weight: 700; transition: 0.3s; }
    .dock-item span { display: block; font-size: 1.7rem; margin-bottom: 6px; filter: grayscale(1); transition: 0.3s; }
    .dock-item.active, .dock-item:active { color: var(--gold); }
    .dock-item.active span, .dock-item:active span { filter: grayscale(0) drop-shadow(0 0 10px var(--orange)); }

    /* Ripple Particle */
    .divine-spark {
        position: absolute; width: 4px; height: 4px; background: var(--gold);
        border-radius: 50%; pointer-events: none; animation: spark 0.6s ease-out forwards;
    }
    @keyframes spark {
        0% { transform: scale(1); opacity: 1; }
        100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }
</style>

<body onclick="divineTap(event)">
    <div id="darshanBg"></div>
    <div class="bg-overlay"></div>
    
    <div class="status-container">
        <div class="chip" id="streakChip">🔥 0 Days</div>
        <div class="chip" style="color:#fff;" id="totalChip">0 Jaap</div>
    </div>

    <div class="main">
        <div class="mantra-container">
            <div class="mantra">Radha Radha</div>
            <div style="font-size: 0.7rem; color: var(--orange); letter-spacing: 4px; font-weight: 600;">KRIPA BARSEGI</div>
        </div>

        <div class="counter-view">
            <svg style="position:absolute; width: 110%; height:110%; transform: rotate(-90deg);">
                <circle cx="176" cy="176" r="150" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="2" />
                <circle id="ring" cx="176" cy="176" r="150" fill="none" stroke="url(#divineGrad)" stroke-width="10" 
                stroke-dasharray="943" stroke-dashoffset="943" stroke-linecap="round" style="transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);" />
                <defs>
                    <linearGradient id="divineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color: var(--orange);" />
                        <stop offset="100%" style="stop-color: var(--gold);" />
                    </linearGradient>
                </defs>
            </svg>
            <p class="daily-num" id="dailyText">0</p>
        </div>

        <div class="info-card" id="goalCard" style="display:none;">
            <div class="info-label">SANKALP PROGRESS</div>
            <div class="info-val" id="goalStat">0 / 0</div>
            <div style="width: 100px; height: 3px; background: rgba(255,255,255,0.1); margin: 8px auto; border-radius: 5px;">
                <div id="goalBar" style="width: 0%; height: 100%; background: var(--gold); border-radius: 5px; transition: 0.5s;"></div>
            </div>
        </div>
    </div>

    <div class="dock">
        <div class="dock-item" onclick="toggleModal(true)"><span>📜</span>SANKALP</div>
        <div class="dock-item" onclick="window.location.href='darshan.html'"><span>🖼️</span>DARSHAN</div>
        <div class="dock-item" onclick="window.location.href='leaderboard.html'"><span>🏆</span>RANK</div>
    </div>

    <script>
        // Use your existing Firebase logic, but update the divineTap function:
        window.divineTap = async (e) => {
            if(e.target.closest('.dock') || e.target.closest('.modal-card')) return;

            // Premium Spark Effect
            for(let i=0; i<8; i++) {
                const spark = document.createElement('div');
                spark.className = 'divine-spark';
                spark.style.left = e.clientX + 'px';
                spark.style.top = e.clientY + 'px';
                spark.style.setProperty('--dx', (Math.random() - 0.5) * 150 + 'px');
                spark.style.setProperty('--dy', (Math.random() - 0.5) * 150 + 'px');
                document.body.appendChild(spark);
                setTimeout(() => spark.remove(), 600);
            }

            // Your existing Firebase increment logic here...
        }
    </script>
</body>

</html>
