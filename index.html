<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Radha Rani Jaap</title>
    <style>
        :root { --orange: #f38630; --bg: #0d0905; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        .bg-fixed { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1620121692029-d088224efc74?q=80&w=1932') center/cover; z-index: -1; }

        .card { 
            width: 85%; max-width: 350px; background: rgba(255,255,255,0.1); 
            padding: 40px 20px; border-radius: 25px; text-align: center; 
            border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        }
        .profile-container { position: relative; width: 110px; height: 110px; margin: 0 auto 20px; }
        .profile-pic { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--orange); box-shadow: 0 0 20px rgba(243, 134, 48, 0.5); }
        
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.4); color: white; box-sizing: border-box; text-align: center; font-size: 1rem; }
        button { width: 100%; padding: 14px; background: var(--orange); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(243, 134, 48, 0.3); }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="bg-fixed"></div>
    <div class="card">
        <h1 style="color:var(--orange); margin-top:0; text-shadow: 0 0 10px rgba(243,134,48,0.5);">Radhe Radhe</h1>
        <p style="opacity: 0.8; font-size: 0.9rem;">Setup your devotional profile</p>
        
        <div class="profile-container" onclick="document.getElementById('fileInput').click()">
            <img id="preview" src="https://ui-avatars.com/api/?name=User&background=333&color=f38630" class="profile-pic">
            <div style="position:absolute; bottom:0; right:0; background:var(--orange); border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; font-size:0.8rem;">📸</div>
        </div>

        <input type="file" id="fileInput" accept="image/*" style="display:none">
        <input type="text" id="name" placeholder="Enter Your Name">
        <button onclick="handleLogin()">Enter Vrindavan 🙏</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArfXVNLQhYAspd2xmZuwLb7bxLaY8sQqY",
            authDomain: "jaap-fdd80.firebaseapp.com",
            projectId: "jaap-fdd80",
            storageBucket: "jaap-fdd80.firebasestorage.app",
            messagingSenderId: "375289521394",
            appId: "1:375289521394:web:ced2cafa4d1743d5ab9c6b"
        };
        const db = getFirestore(initializeApp(firebaseConfig));
        let base64Img = "";

        document.getElementById('fileInput').onchange = (e) => {
            const reader = new FileReader();
            reader.readAsDataURL(e.target.files[0]);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 150; canvas.height = 150;
                    canvas.getContext('2d').drawImage(img, 0, 0, 150, 150);
                    base64Img = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('preview').src = base64Img;
                };
            };
        };

        window.handleLogin = async () => {
            const name = document.getElementById('name').value.trim();
            if(!name) return alert("Please enter your name!");
            await setDoc(doc(db, "users", name), { profilePic: base64Img, totalCount: 0, dailyCount: 0, streak: 0, lastDate: "" }, { merge: true });
            localStorage.setItem('jaapUserName', name);
            window.location.href = "index.html";
        };
    </script>
</body>
</html>
