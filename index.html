<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Radha Rani Jaap - Nexus V6</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Outfit:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #ff9f43;
            --divine: #ffcc33;
            --bg-base: #020100;
            --surface: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: var(--bg-base); color: white; overflow: hidden;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        #bgLayer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            z-index: -2; transition: filter 2s, transform 3s ease-in-out;
            filter: brightness(0.3) contrast(1.1);
        }

        .ambient-glow {
            position: fixed; bottom: -20%; left: 50%; transform: translateX(-50%);
            width: 150%; height: 60%; background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            opacity: 0.15; z-index: -1; filter: blur(80px);
        }

        /* Top Header */
        .header-nexus {
            position: fixed; top: 45px; width: 90%; left: 5%;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .stat-pill {
            background: var(--surface); backdrop-filter: blur(25px);
            padding: 10px 18px; border-radius: 18px; border: 1px solid var(--border);
            font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; color: var(--divine);
        }

        /* Center Engine */
        .nexus-core { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .mantra-float {
            font-family: 'Outfit', sans-serif; font-size: 3.2rem; font-weight: 900;
            background: linear-gradient(180deg, #fff 30%, var(--divine));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 20px; animation: breathe 5s infinite ease-in-out;
        }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }

        .counter-nexus {
            position: relative; width: 320px; height: 320px;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s;
        }

        .main-num {
            font-family: 'Outfit', sans-serif; font-size: 8.5rem; line-height: 1;
            margin: 0; z-index: 10; text-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* Advanced Progress Ring */
        #ringInner { transition: stroke-dashoffset 0.4s cubic-bezier(0.4, 0, 0.2, 1); filter: drop-shadow(0 0 10px var(--accent)); }

        /* Floating Info Card */
        .mission-box {
            margin-top: 40px; padding: 15px 30px; border-radius: 25px;
            background: var(--surface); border: 1px solid var(--border);
            backdrop-filter: blur(15px); text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .mission-label { font-size: 0.6rem; font-weight: 700; color: var(--accent); letter-spacing: 3px; }

        /* Navigation Dock */
        .nexus-dock {
            position: fixed; bottom: 35px; width: 85%; left: 7.5%;
            background: rgba(10, 8, 5, 0.85); backdrop-filter: blur(30px);
            border: 1px solid var(--border); border-radius: 30px;
            display: flex; justify-content: space-around; padding: 15px 0; z-index: 100;
        }
        .dock-item { color: #888; text-decoration: none; font-size: 0.65rem; font-weight: 700; text-align: center; }
        .dock-item span { display: block; font-size: 1.7rem; margin-bottom: 5px; opacity: 0.6; }
        .dock-item:active { transform: scale(0.9); color: var(--divine); }

        /* Particles */
        .divine-spark {
            position: absolute; pointer-events: none; width: 3px; height: 3px; background: white; border-radius: 50%;
            box-shadow: 0 0 8px var(--divine); animation: fly 0.6s ease-out forwards;
        }
        @keyframes fly { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: translate(var(--x), var(--y)) scale(0); } }
    </style>
</head>
<body onclick="nexusTap(event)">

    <div id="bgLayer"></div>
    <div class="ambient-glow"></div>
    <audio id="bell" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

    <div class="header-nexus">
        <div class="stat-pill" id="streak">🔥 0 DAYS</div>
        <div class="stat-pill" id="total" style="color:#fff;">0 TOTAL</div>
    </div>

    <div class="nexus-core">
        <div class="mantra-float">Radha Radha</div>
        
        <div class="counter-nexus" id="coreWrapper">
            <svg style="position:absolute; width: 110%; height:110%; transform: rotate(-90deg);">
                <circle cx="176" cy="176" r="155" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="2" />
                <circle id="ringInner" cx="176" cy="176" r="155" fill="none" stroke="url(#nexusGrad)" stroke-width="12" 
                stroke-dasharray="974" stroke-dashoffset="974" stroke-linecap="round" />
                <defs>
                    <linearGradient id="nexusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="var(--accent)" />
                        <stop offset="100%" stop-color="var(--divine)" />
                    </linearGradient>
                </defs>
            </svg>
            <p class="main-num" id="dailyNum">0</p>
        </div>

        <div class="mission-box" id="sankalpCard" style="display:none;">
            <div class="mission-label">SANKALP MISSION</div>
            <div style="font-size: 1.2rem; font-weight: 700; margin: 5px 0;" id="sankalpStat">0 / 0</div>
            <div style="width: 120px; height: 3px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: auto;">
                <div id="fill" style="height: 100%; background: var(--divine); width: 0%; transition: 0.5s;"></div>
            </div>
        </div>
    </div>

    <div class="nexus-dock">
        <div class="dock-item" onclick="toggleModal(true)"><span>📜</span>SANKALP</div>
        <div class="dock-item" onclick="location.href='darshan.html'"><span>🖼️</span>DARSHAN</div>
        <div class="dock-item" onclick="location.href='leaderboard.html'"><span>🏆</span>RANK</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArfXVNLQhYAspd2xmZuwLb7bxLaY8sQqY",
            authDomain: "jaap-fdd80.firebaseapp.com",
            projectId: "jaap-fdd80",
            storageBucket: "jaap-fdd80.firebasestorage.app",
            messagingSenderId: "375289521394",
            appId: "1:375289521394:web:ced2cafa4d1743d5ab9c6b"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const user = localStorage.getItem('jaapUserName');
        const today = new Date().toLocaleDateString();

        if(!user) location.href = "login.html";

        const photoSet = [
            "https://images.unsplash.com/photo-1544924222-355b1f0ad5a7?q=80&w=1200",
            "https://images.unsplash.com/photo-1620121692029-d088224efc74?q=80&w=1200",
            "https://images.unsplash.com/photo-1616013050162-4f366e6b6680?q=80&w=1200"
        ];

        function syncNexus(val) {
            const offset = 974 - (val % 108 / 108) * 974;
            document.getElementById('ringInner').style.strokeDashoffset = offset;
            
            const pIdx = (new Date().getDate() + Math.floor(val / 108)) % photoSet.length;
            document.getElementById('bgLayer').style.backgroundImage = `url('${photoSet[pIdx]}')`;

            if(val > 0 && val % 108 === 0) {
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#ffcc33', '#ff9f43'] });
                document.getElementById('bell').play();
                if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
            }
        }

        onSnapshot(doc(db, "users", user), (ds) => {
            if(ds.exists()) {
                const data = ds.data();
                const daily = data.lastDate === today ? data.dailyCount : 0;
                document.getElementById('dailyNum').innerText = daily;
                document.getElementById('total').innerText = `${(data.totalCount || 0).toLocaleString()} TOTAL`;
                document.getElementById('streak').innerText = `🔥 ${data.streak || 0} DAYS`;
                syncNexus(daily);

                if(data.sankalpGoal && data.sankalpDate === today) {
                    document.getElementById('sankalpCard').style.display = 'block';
                    document.getElementById('sankalpStat').innerText = `${daily} / ${data.sankalpGoal}`;
                    document.getElementById('fill').style.width = Math.min((daily/data.sankalpGoal)*100, 100) + "%";
                }
            }
        });

        window.nexusTap = async (e) => {
            if(e.target.closest('.nexus-dock')) return;

            // Nexus Visuals
            const core = document.getElementById('coreWrapper');
            core.style.transform = 'scale(0.96)';
            setTimeout(() => core.style.transform = 'scale(1)', 100);

            for(let i=0; i<4; i++) {
                const s = document.createElement('div');
                s.className = 'divine-spark';
                s.style.left = e.clientX + 'px';
                s.style.top = e.clientY + 'px';
                s.style.setProperty('--x', (Math.random() - 0.5) * 150 + 'px');
                s.style.setProperty('--y', (Math.random() - 0.5) * 150 + 'px');
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 600);
            }

            if(navigator.vibrate) navigator.vibrate(40);

            await setDoc(doc(db, "users", user), { 
                dailyCount: increment(1), 
                totalCount: increment(1), 
                lastDate: today, 
                lastTimestamp: Date.now() 
            }, { merge: true });
        };
    </script>
</body>
</html>
