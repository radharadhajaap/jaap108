<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radha Radha Jaap v14.0 - Mystic Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #FFD700; --orange: #FF8C00; --bg: #050301;
            --glass: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.15);
            --brahma-color: #8A2BE2;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Outfit', sans-serif; background: var(--bg);
            color: white; overflow: hidden; user-select: none;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }

        /* 1. RARE 3D PARALLAX BACKGROUND */
        #parallax-bg {
            position: fixed; top: -10%; left: -10%; width: 120%; height: 120%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1616013050162-4f366e6b6680?q=80&w=1200');
            background-size: cover; background-position: center;
            z-index: -3; transition: transform 0.1s ease-out;
        }

        /* 2. DIVINE ENERGY BAR (SIDEBAR) */
        .energy-rail {
            position: fixed; left: 0; bottom: 0; width: 6px; height: 100%;
            background: rgba(255,255,255,0.05); z-index: 1000;
        }
        #energy-level {
            width: 100%; height: 0%; background: var(--gold);
            box-shadow: 0 0 20px var(--gold); transition: height 0.4s ease;
        }

        /* 3. BRAHMA MUHURTA THEME */
        .brahma-active .count-display {
            background: linear-gradient(#fff, var(--brahma-color)) !important;
            -webkit-background-clip: text !important;
            text-shadow: 0 0 30px rgba(138, 43, 226, 0.5);
        }

        /* Top Nav Chips */
        .top-nav {
            position: fixed; top: 50px; width: 90%; left: 5%;
            display: flex; justify-content: space-between; z-index: 100;
        }
        .chip {
            background: var(--glass); backdrop-filter: blur(25px);
            padding: 10px 18px; border-radius: 25px; border: 1px solid var(--border);
            font-size: 0.8rem; font-weight: 700; color: var(--gold);
        }

        /* Main Center Engine */
        .main-stage {
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .mantra-text {
            font-size: 1.3rem; letter-spacing: 12px; font-weight: 300;
            text-transform: uppercase; color: var(--gold); margin-bottom: 25px;
            opacity: 0.8;
        }
        .count-display {
            font-size: 11rem; font-weight: 900; margin: 0;
            background: linear-gradient(#fff, #999);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            line-height: 1; letter-spacing: -5px;
        }

        /* Footer Layout (As per your Screenshot) */
        .bottom-shelf {
            position: fixed; bottom: 0; width: 100%; padding-bottom: 40px;
            background: linear-gradient(transparent, #000 80%); z-index: 50;
        }
        .stats-row {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            width: 90%; margin: 0 auto 25px;
        }
        .card {
            background: var(--glass); border: 1px solid var(--border);
            padding: 18px; border-radius: 25px; text-align: center;
            backdrop-filter: blur(15px);
        }
        .card-label { font-size: 0.65rem; color: #777; text-transform: uppercase; letter-spacing: 1px; }
        .card-val { font-size: 1.3rem; font-weight: 700; margin-top: 5px; }

        .dock {
            width: 88%; margin: 0 auto; background: rgba(255,255,255,0.06);
            border: 1px solid var(--border); border-radius: 40px;
            display: flex; justify-content: space-around; padding: 18px 0;
            backdrop-filter: blur(20px);
        }
        .dock-item { font-size: 1.6rem; cursor: pointer; transition: 0.3s; opacity: 0.7; }
        .dock-item:hover { opacity: 1; transform: scale(1.2); }
    </style>
</head>
<body onpointerdown="handleMysticTap(event)">

    <div id="parallax-bg"></div>
    <div class="energy-rail"><div id="energy-level"></div></div>
    <audio id="bell" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

    <div class="top-nav">
        <div class="chip" id="streakDisp">🔥 0 DAYS</div>
        <div class="chip" id="totalDisp">0 TOTAL</div>
    </div>

    <div class="main-stage">
        <div class="mantra-text" id="mantra">RADHA RADHA</div>
        <h1 class="count-display" id="mainNum">0</h1>
    </div>

    <div class="bottom-shelf">
        <div class="stats-row">
            <div class="card">
                <div class="card-label">MALA COUNT</div>
                <div class="card-val" id="malaVal">0.0</div>
            </div>
            <div class="card">
                <div class="card-label">SESSION TARGET</div>
                <div class="card-val" id="targetVal">108</div>
            </div>
        </div>
        
        <nav class="dock">
            <div class="dock-item" onclick="openSankalp()">📜</div>
            <div class="dock-item" onclick="location.href='darshan.html'">🖼️</div>
            <div class="dock-item" onclick="location.href='leaderboard.html'">🏆</div>
            <div class="dock-item" onclick="openSettings()">⚙️</div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyArfXVNLQhYAspd2xmZuwLb7bxLaY8sQqY",
            authDomain: "jaap-fdd80.firebaseapp.com",
            projectId: "jaap-fdd80",
            storageBucket: "jaap-fdd80.firebasestorage.app",
            messagingSenderId: "375289521394",
            appId: "1:375289521394:web:ced2cafa4d1743d5ab9c6b"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const user = localStorage.getItem('jaapUserName') || "Guest";
        const today = new Date().toLocaleDateString();

        let count = 0;
        let energy = 0;

        // 1. BRAHMA MUHURTA LOGIC (Rare Feature)
        function checkBrahma() {
            const hour = new Date().getHours();
            const min = new Date().getMinutes();
            const isBrahma = (hour === 3 && min >= 48) || (hour === 4) || (hour === 5 && min <= 30);
            if(isBrahma) document.body.classList.add('brahma-active');
            else document.body.classList.remove('brahma-active');
        }
        setInterval(checkBrahma, 60000); checkBrahma();

        // 2. TILT PARALLAX EFFECT (Rare Feature)
        window.addEventListener('deviceorientation', (e) => {
            const moveX = e.gamma / 3;
            const moveY = e.beta / 3;
            document.getElementById('parallax-bg').style.transform = `translate(${moveX}px, ${moveY}px) scale(1.1)`;
        });

        // 3. DATA SYNC & RENDER
        onSnapshot(doc(db, "users", user), (snap) => {
            if(snap.exists()){
                const d = snap.data();
                count = d.lastDate === today ? d.dailyCount : 0;
                document.getElementById('mainNum').innerText = count;
                document.getElementById('malaVal').innerText = (count / 108).toFixed(1);
                document.getElementById('totalDisp').innerText = `${(d.totalCount || 0).toLocaleString()} TOTAL`;
                document.getElementById('streakDisp').innerText = `🔥 ${d.streak || 0} DAYS`;
            }
        });

        // 4. MYSTIC TAP ENGINE
        window.handleMysticTap = async (e) => {
            if(e.target.closest('.dock')) return;
            
            count++;
            energy = Math.min(energy + 2, 100);
            document.getElementById('energy-level').style.height = energy + "%";

            if(navigator.vibrate) navigator.vibrate(45);
            if(count % 108 === 0) {
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.7 }, colors: ['#FFD700', '#FF8C00'] });
                document.getElementById('bell').play();
            }

            // Sync with Firebase
            await setDoc(doc(db, "users", user), {
                dailyCount: increment(1),
                totalCount: increment(1),
                lastDate: today
            }, { merge: true });
        };

        // Energy Decay
        setInterval(() => {
            energy = Math.max(energy - 0.5, 0);
            document.getElementById('energy-level').style.height = energy + "%";
        }, 1000);

        window.openSankalp = () => prompt("Apna aaj ka Sankalp set karein:", "108");
        window.openSettings = () => alert("Mystic Mode: Sound & Themes Coming Soon!");
    </script>
</body>
</html>
