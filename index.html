<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Radha Rani Jaap Pro</title>
    <style>
        :root { --orange: #f38630; --glass: rgba(255, 255, 255, 0.1); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', sans-serif; background-color: #0d0905; color: white; overflow: hidden; }

        /* Background Layer */
        #darshanBg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            z-index: -1; transition: background-image 1.2s ease-in-out;
            background-color: #000;
        }

        /* Glass Nav */
        .top-nav { position: fixed; top: 20px; width: 100%; display: flex; justify-content: space-evenly; z-index: 100; }
        .nav-btn { background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); padding: 10px 18px; border-radius: 50px; color: white; font-size: 0.8rem; cursor: pointer; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        /* Sankalp Section */
        .sankalp-box { position: fixed; top: 85px; width: 90%; left: 5%; background: rgba(0,0,0,0.7); border-radius: 15px; padding: 12px; border: 1px solid rgba(243,134,48,0.4); text-align: center; z-index: 90; display: none; }
        .sankalp-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 8px; overflow: hidden; }
        .sankalp-fill { height: 100%; background: linear-gradient(90deg, #4caf50, #8bc34a); width: 0%; transition: 0.6s ease; }

        .main { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.7) 100%); }
        .mantra { font-size: 2.8rem; font-weight: bold; text-shadow: 0 0 25px var(--orange); margin-bottom: 10px; letter-spacing: 1px; }

        /* Mala UI */
        .mala-wrap { position: relative; width: 280px; height: 280px; display: flex; align-items: center; justify-content: center; }
        .mala-svg { position: absolute; width: 100%; height: 100%; transform: rotate(-90deg); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .daily-num { font-size: 5.8rem; font-weight: 800; line-height: 1; margin: 0; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        /* Animations */
        .float-radhe { position: absolute; color: #ffcc33; font-weight: bold; pointer-events: none; animation: floatUp 0.8s forwards; font-size: 1.6rem; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-130px) scale(1.2); } }

        /* Modal */
        #sankalpModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1512; padding: 30px; border-radius: 25px; border: 1px solid var(--orange); z-index: 1000; width: 85%; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 12px; border: 1px solid #444; background: #000; color: white; text-align: center; font-size: 1.2rem; }
    </style>
</head>
<body onclick="handleTap(event)">

    <div id="darshanBg"></div>
    <audio id="bellSound"><source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

    <div class="top-nav">
        <div class="nav-btn" onclick="openSankalp(event)">📜 Set Sankalp</div>
        <a href="leaderboard.html" class="nav-btn">🏆 Leaderboard</a>
    </div>

    <div class="sankalp-box" id="sankalpDisplay">
        <div style="font-size: 0.8rem; color: #ffcc33;">🙏 Goal Progress: <span id="sCurrent">0</span> / <span id="sGoal">0</span></div>
        <div class="sankalp-bar"><div class="sankalp-fill" id="sFill"></div></div>
    </div>

    <div class="main">
        <div id="streak" style="color:#ffeb3b; margin-bottom: 10px; font-weight: bold; font-size: 1.1rem;">🔥 0 Day Streak</div>
        <div class="mantra">Radha Radha</div>
        <div class="mala-wrap">
            <svg class="mala-svg" id="malaSvg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" />
                <circle id="progCirc" cx="50" cy="50" r="45" fill="none" stroke="#f38630" stroke-width="3.5" stroke-dasharray="282.7" stroke-dashoffset="282.7" stroke-linecap="round" />
            </svg>
            <div style="z-index:10;">
                <p class="daily-num" id="dailyCount">0</p>
                <p style="font-size: 0.8rem; letter-spacing: 4px; color: var(--orange); margin: 0; font-weight: bold;">JAAP</p>
            </div>
        </div>
        <p style="margin-top:25px; opacity:0.9; font-size: 1.1rem;">LIFE TOTAL: <b id="totalCount" style="color:var(--orange)">0</b></p>
    </div>

    <div id="sankalpModal">
        <h2 style="color:var(--orange); margin-top:0;">Sankalp</h2>
        <p style="opacity:0.8;">How many Malas (108 jaap) today?</p>
        <input type="number" id="mInput" placeholder="Enter Mala count (e.g. 11)">
        <button onclick="setSankalp()" style="background:var(--orange); border:none; padding:15px; border-radius:12px; color:white; font-weight:bold; width:100%; font-size: 1.1rem; cursor: pointer;">Sankalp Lein 🙏</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArfXVNLQhYAspd2xmZuwLb7bxLaY8sQqY",
            authDomain: "jaap-fdd80.firebaseapp.com",
            projectId: "jaap-fdd80",
            storageBucket: "jaap-fdd80.firebasestorage.app",
            messagingSenderId: "375289521394",
            appId: "1:375289521394:web:ced2cafa4d1743d5ab9c6b"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const user = localStorage.getItem('jaapUserName');
        const today = new Date().toLocaleDateString();

        if(!user) window.location.href = "login.html";

        let rot = 0;
        // High-Quality Unsplash Spiritual Collection
        const photos = [
            "https://images.unsplash.com/photo-1620121692029-d088224efc74?q=80&w=1932",
            "https://images.unsplash.com/photo-1631553127988-34860639f727?q=80&w=1932",
            "https://images.unsplash.com/photo-1544924222-355b1f0ad5a7?q=80&w=1932",
            "https://images.unsplash.com/photo-1563810222123-26176313388c?q=80&w=1932",
            "https://images.unsplash.com/photo-1616013050162-4f366e6b6680?q=80&w=1932"
        ];

        function updateDisplay(daily) {
            // Unsplash Background Logic
            const malaIndex = Math.floor(daily / 108);
            const dateSeed = new Date().getDate();
            const photoIdx = (dateSeed + malaIndex) % photos.length;
            
            const bg = document.getElementById('darshanBg');
            const newImg = `linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('${photos[photoIdx]}')`;
            
            if(bg.style.backgroundImage !== newImg) {
                bg.style.backgroundImage = newImg;
            }
            
            // Mala Circle
            const offset = 282.7 - (daily % 108 / 108) * 282.7;
            document.getElementById('progCirc').style.strokeDashoffset = offset;
        }

        onSnapshot(doc(db, "users", user), (ds) => {
            if(ds.exists()) {
                const d = ds.data();
                const daily = d.lastDate === today ? d.dailyCount : 0;
                document.getElementById('dailyCount').innerText = daily;
                document.getElementById('totalCount').innerText = d.totalCount.toLocaleString();
                document.getElementById('streak').innerText = `🔥 ${d.streak || 0} Day Streak`;
                
                updateDisplay(daily);

                if(d.sankalpGoal && d.sankalpDate === today) {
                    document.getElementById('sankalpDisplay').style.display = 'block';
                    document.getElementById('sGoal').innerText = d.sankalpGoal;
                    document.getElementById('sCurrent').innerText = daily;
                    const perc = Math.min((daily/d.sankalpGoal)*100, 100);
                    document.getElementById('sFill').style.width = perc + "%";
                }
            }
        });

        window.openSankalp = (e) => { e.stopPropagation(); document.getElementById('sankalpModal').style.display = 'block'; };
        
        window.setSankalp = async () => {
            const m = document.getElementById('mInput').value;
            if(!m || m <= 0) return;
            await setDoc(doc(db, "users", user), { sankalpGoal: m * 108, sankalpDate: today }, { merge: true });
            document.getElementById('sankalpModal').style.display = 'none';
        };

        window.handleTap = async (e) => {
            if(e.target.closest('.nav-btn') || e.target.closest('#sankalpModal')) return;

            // Visual Feedback
            rot += (360 / 108);
            document.getElementById('malaSvg').style.transform = `rotate(${rot - 90}deg)`;

            const f = document.createElement('div'); f.className='float-radhe'; f.innerText='Radhe';
            f.style.left=e.clientX+'px'; f.style.top=e.clientY+'px'; document.body.appendChild(f);
            setTimeout(()=>f.remove(), 800);

            // Update Background Instantly
            const currentDaily = parseInt(document.getElementById('dailyCount').innerText) + 1;
            updateDisplay(currentDaily);

            if(currentDaily % 108 === 0) document.getElementById('bellSound').play();
            
            // Firebase Sync
            await setDoc(doc(db, "users", user), { 
                dailyCount: increment(1), 
                totalCount: increment(1), 
                lastDate: today, 
                lastTimestamp: Date.now() 
            }, { merge: true });

            if(navigator.vibrate) navigator.vibrate(45);
        };
    </script>
</body>
</html>
