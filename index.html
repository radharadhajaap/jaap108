<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Radha Rani Jaap Pro</title>
    <style>
        :root { --orange: #f38630; --glass: rgba(255, 255, 255, 0.1); }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #0d0905; color: white; overflow: hidden; 
        }

        /* Fixed Background Container with Fallback Color */
        #darshanBg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1; 
            transition: background-image 1.5s ease-in-out;
            /* Default dark gradient if image fails */
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.95));
        }

        /* Glass UI */
        .top-nav { position: fixed; top: 20px; width: 100%; display: flex; justify-content: space-evenly; z-index: 100; }
        .nav-btn { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); padding: 10px 18px; border-radius: 50px; color: white; font-size: 0.8rem; cursor: pointer; text-decoration: none; }

        .sankalp-box { position: fixed; top: 85px; width: 90%; left: 5%; background: rgba(0,0,0,0.8); border-radius: 15px; padding: 12px; border: 1px solid rgba(243,134,48,0.4); text-align: center; z-index: 90; display: none; }
        .sankalp-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 8px; overflow: hidden; }
        .sankalp-fill { height: 100%; background: linear-gradient(90deg, #4caf50, #8bc34a); width: 0%; transition: 0.6s; }

        .main { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .mantra { font-size: 2.8rem; font-weight: bold; text-shadow: 0 0 20px rgba(243, 134, 48, 1); margin-bottom: 10px; }

        .mala-wrap { position: relative; width: 280px; height: 280px; display: flex; align-items: center; justify-content: center; }
        .mala-svg { position: absolute; width: 100%; height: 100%; transform: rotate(-90deg); transition: 0.4s; }
        .daily-num { font-size: 5.8rem; font-weight: 800; line-height: 1; margin: 0; }

        .float-radhe { position: absolute; color: #ffcc33; font-weight: bold; pointer-events: none; animation: floatUp 0.8s forwards; font-size: 1.6rem; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-130px); } }

        #sankalpModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1512; padding: 30px; border-radius: 25px; border: 1px solid var(--orange); z-index: 1000; width: 85%; text-align: center; }
        input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 12px; border: 1px solid #444; background: #000; color: white; text-align: center; font-size: 1.2rem; }
    </style>
</head>
<body onclick="handleTap(event)">

    <div id="darshanBg"></div>
    <audio id="bellSound"><source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

    <div class="top-nav">
        <div class="nav-btn" onclick="openSankalp(event)">📜 Sankalp</div>
        <a href="leaderboard.html" class="nav-btn">🏆 Leaderboard</a>
    </div>

    <div class="sankalp-box" id="sankalpDisplay">
        <div style="font-size: 0.8rem; color: #ffcc33;">🙏 Goal: <span id="sCurrent">0</span> / <span id="sGoal">0</span></div>
        <div class="sankalp-bar"><div class="sankalp-fill" id="sFill"></div></div>
    </div>

    <div class="main">
        <div id="streak" style="color:#ffeb3b; margin-bottom: 10px; font-weight: bold;">🔥 0 Day Streak</div>
        <div class="mantra">Radha Radha</div>
        <div class="mala-wrap">
            <svg class="mala-svg" id="malaSvg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" />
                <circle id="progCirc" cx="50" cy="50" r="45" fill="none" stroke="#f38630" stroke-width="3.5" stroke-dasharray="282.7" stroke-dashoffset="282.7" stroke-linecap="round" />
            </svg>
            <div style="z-index:10;">
                <p class="daily-num" id="dailyCount">0</p>
                <p style="font-size: 0.8rem; letter-spacing: 4px; color: var(--orange); margin: 0; font-weight: bold;">JAAP</p>
            </div>
        </div>
        <p style="margin-top:25px; opacity:0.9;">LIFE TOTAL: <b id="totalCount" style="color:var(--orange)">0</b></p>
    </div>

    <div id="sankalpModal">
        <h2 style="color:var(--orange); margin-top:0;">Sankalp</h2>
        <input type="number" id="mInput" placeholder="Mala ki sankhya">
        <button onclick="setSankalp()" style="background:var(--orange); border:none; padding:15px; border-radius:12px; color:white; font-weight:bold; width:100%; cursor: pointer;">Confirm</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArfXVNLQhYAspd2xmZuwLb7bxLaY8sQqY",
            authDomain: "jaap-fdd80.firebaseapp.com",
            projectId: "jaap-fdd80",
            storageBucket: "jaap-fdd80.firebasestorage.app",
            messagingSenderId: "375289521394",
            appId: "1:375289521394:web:ced2cafa4d1743d5ab9c6b"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const user = localStorage.getItem('jaapUserName');
        const today = new Date().toLocaleDateString();

        if(!user) window.location.href = "login.html";

        let rot = 0;
        
        // --- High-Quality Darshan Links (Direct Images for better loading) ---
        const photos = [
            "https://i.ibb.co/3yk0Y9g/radha1.jpg",
            "https://i.ibb.co/9q0Gq5V/radha2.jpg",
            "https://i.ibb.co/y4Y2L1T/radha3.jpg",
            "https://i.ibb.co/hK7Y9vH/radha4.jpg"
        ];

        // Backup Unsplash links if IBB fails
        const fallbackPhotos = [
            "https://images.unsplash.com/photo-1620121692029-d088224efc74?auto=format&fit=crop&w=1000",
            "https://images.unsplash.com/photo-1616013050162-4f366e6b6680?auto=format&fit=crop&w=1000"
        ];

        function updateBackground(daily) {
            const malaIndex = Math.floor(daily / 108);
            const dateSeed = new Date().getDate();
            
            // Photo select logic
            const allPhotos = [...photos, ...fallbackPhotos];
            const idx = (dateSeed + malaIndex) % allPhotos.length;
            
            const bg = document.getElementById('darshanBg');
            const imgUrl = allPhotos[idx];
            
            // Set Background with proper overlay
            bg.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)), url('${imgUrl}')`;
        }

        onSnapshot(doc(db, "users", user), (ds) => {
            if(ds.exists()) {
                const d = ds.data();
                const daily = d.lastDate === today ? d.dailyCount : 0;
                document.getElementById('dailyCount').innerText = daily;
                document.getElementById('totalCount').innerText = d.totalCount;
                document.getElementById('streak').innerText = `🔥 ${d.streak || 0} Day Streak`;
                
                updateBackground(daily);

                const offset = 282.7 - (daily % 108 / 108) * 282.7;
                document.getElementById('progCirc').style.strokeDashoffset = offset;

                if(d.sankalpGoal && d.sankalpDate === today) {
                    document.getElementById('sankalpDisplay').style.display = 'block';
                    document.getElementById('sGoal').innerText = d.sankalpGoal;
                    document.getElementById('sCurrent').innerText = daily;
                    document.getElementById('sFill').style.width = Math.min((daily/d.sankalpGoal)*100, 100) + "%";
                }
            }
        });

        window.openSankalp = (e) => { e.stopPropagation(); document.getElementById('sankalpModal').style.display = 'block'; };
        
        window.setSankalp = async () => {
            const m = document.getElementById('mInput').value;
            if(!m || m <= 0) return;
            await setDoc(doc(db, "users", user), { sankalpGoal: m * 108, sankalpDate: today }, { merge: true });
            document.getElementById('sankalpModal').style.display = 'none';
        };

        window.handleTap = async (e) => {
            if(e.target.closest('.nav-btn') || e.target.closest('#sankalpModal')) return;

            rot += (360 / 108);
            document.getElementById('malaSvg').style.transform = `rotate(${rot - 90}deg)`;

            const f = document.createElement('div'); f.className='float-radhe'; f.innerText='Radhe';
            f.style.left=e.clientX+'px'; f.style.top=e.clientY+'px'; document.body.appendChild(f);
            setTimeout(()=>f.remove(), 800);

            const currentCount = parseInt(document.getElementById('dailyCount').innerText) + 1;
            updateBackground(currentCount);

            if(currentCount % 108 === 0) document.getElementById('bellSound').play();
            
            await setDoc(doc(db, "users", user), { 
                dailyCount: increment(1), 
                totalCount: increment(1), 
                lastDate: today, 
                lastTimestamp: Date.now() 
            }, { merge: true });

            if(navigator.vibrate) navigator.vibrate(45);
        };
    </script>
</body>
</html>
