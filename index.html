<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Radha Rani Jaap - Divine</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --orange: #f38630; 
            --gold: #ffcc33;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #0d0905; color: white; overflow: hidden;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        /* Dynamic Parallax Background */
        #darshanBg {
            position: fixed; top: -10%; left: -10%; width: 120%; height: 120%;
            background-size: cover; background-position: center;
            z-index: -2; transition: background-image 2.5s ease-in-out;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9));
        }

        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.85) 100%);
            z-index: -1;
        }

        /* Premium Top Status Bar */
        .status-bar {
            position: fixed; top: 20px; width: 90%; left: 5%;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .chip {
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 8px 16px; border-radius: 20px; border: 1px solid var(--glass-border);
            font-size: 0.8rem; font-weight: bold; color: var(--gold);
        }

        /* Main Counter Circle */
        .main { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .mantra-text {
            font-size: 3.5rem; font-weight: 900; letter-spacing: 1px;
            background: linear-gradient(180deg, #fff 30%, var(--gold) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 20px; text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .counter-container {
            position: relative; width: 320px; height: 320px;
            display: flex; align-items: center; justify-content: center;
        }

        .aura-glow {
            position: absolute; width: 240px; height: 240px;
            background: var(--orange); border-radius: 50%;
            filter: blur(80px); opacity: 0.2; z-index: 0;
            animation: pulseAura 4s infinite alternate;
        }
        @keyframes pulseAura { from { transform: scale(1); opacity: 0.15; } to { transform: scale(1.2); opacity: 0.3; } }

        .daily-count {
            font-size: 7.5rem; font-weight: 900; line-height: 1; margin: 0;
            z-index: 10; font-family: 'Monaco', monospace;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
        }

        /* Floating Tap Ripple */
        .ripple {
            position: absolute; border: 2px solid var(--gold);
            border-radius: 50%; transform: scale(0);
            animation: rippleEffect 0.6s ease-out; pointer-events: none;
        }
        @keyframes rippleEffect {
            to { transform: scale(4); opacity: 0; }
        }

        /* Bottom Floating Bar */
        .dock {
            position: fixed; bottom: 30px; width: 85%; left: 7.5%;
            background: rgba(20, 15, 10, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 25px;
            display: flex; justify-content: space-around; padding: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); z-index: 100;
        }
        .dock-item { color: white; text-decoration: none; font-size: 0.7rem; text-align: center; font-weight: 600; opacity: 0.8; }
        .dock-item span { display: block; font-size: 1.5rem; margin-bottom: 4px; }

        /* Goal View */
        .goal-indicator {
            position: absolute; bottom: -60px; width: 100%; text-align: center;
        }
        .progress-track {
            width: 200px; height: 4px; background: rgba(255,255,255,0.1);
            margin: 10px auto; border-radius: 10px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: var(--orange); width: 0%; transition: 0.5s;
        }
    </style>
</head>
<body onclick="createRipple(event)">

    <div id="darshanBg"></div>
    <div class="bg-overlay"></div>
    <audio id="bellSound"><source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

    <div class="status-bar">
        <div class="chip" id="streakDisplay">🔥 0 DAY STREAK</div>
        <div class="chip" style="color: white; border-color: var(--orange);">RANK: #1</div>
    </div>

    <div class="main">
        <div class="mantra-text">Radha Radha</div>
        
        <div class="counter-container">
            <div class="aura-glow"></div>
            <svg style="position:absolute; width: 100%; height:100%; transform: rotate(-90deg);">
                <circle cx="160" cy="160" r="145" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="4" />
                <circle id="ring" cx="160" cy="160" r="145" fill="none" stroke="url(#goldGrad)" stroke-width="6" 
                stroke-dasharray="911" stroke-dashoffset="911" stroke-linecap="round" style="transition: 0.4s;" />
                <defs>
                    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color: #f38630;" />
                        <stop offset="100%" style="stop-color: #ffcc33;" />
                    </linearGradient>
                </defs>
            </svg>
            
            <div style="z-index: 20; text-align: center;">
                <p class="daily-count" id="countText">0</p>
                <p style="letter-spacing: 5px; font-size: 0.8rem; color: var(--orange); margin: 0; font-weight: 800;">JAAP COMPLETE</p>
            </div>

            <div class="goal-indicator" id="goalBar" style="display: none;">
                <div style="font-size: 0.7rem; color: var(--gold); font-weight: bold;">SANKALP: <span id="gText">0/0</span></div>
                <div class="progress-track"><div class="progress-fill" id="gFill"></div></div>
            </div>
        </div>

        <p style="margin-top: 100px; opacity: 0.4; font-size: 0.8rem;">LIFETIME TOTAL: <span id="lifeTotal">0</span></p>
    </div>

    <div class="dock">
        <div class="dock-item" onclick="openSankalp()"><span>📜</span>SANKALP</div>
        <div class="dock-item" onclick="window.location.href='leaderboard.html'"><span>🏆</span>LEADERBOARD</div>
        <div class="dock-item" onclick="window.location.reload()"><span>✨</span>DARSHAN</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArfXVNLQhYAspd2xmZuwLb7bxLaY8sQqY",
            authDomain: "jaap-fdd80.firebaseapp.com",
            projectId: "jaap-fdd80",
            storageBucket: "jaap-fdd80.firebasestorage.app",
            messagingSenderId: "375289521394",
            appId: "1:375289521394:web:ced2cafa4d1743d5ab9c6b"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const user = localStorage.getItem('jaapUserName');
        const today = new Date().toLocaleDateString();

        if(!user) window.location.href = "login.html";

        const photos = [
            "https://images.unsplash.com/photo-1620121692029-d088224efc74?q=80&w=1932",
            "https://images.unsplash.com/photo-1544924222-355b1f0ad5a7?q=80&w=1932",
            "https://images.unsplash.com/photo-1616013050162-4f366e6b6680?q=80&w=1932"
        ];

        function updateUI(daily) {
            // Ring animation (911 is the circumference of r=145)
            const offset = 911 - (daily % 108 / 108) * 911;
            document.getElementById('ring').style.strokeDashoffset = offset;

            // Background change every mala
            const photoIdx = (new Date().getDate() + Math.floor(daily / 108)) % photos.length;
            document.getElementById('darshanBg').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.85)), url('${photos[photoIdx]}')`;

            if(daily > 0 && daily % 108 === 0) {
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#f38630', '#ffcc33'] });
                document.getElementById('bellSound').play();
            }
        }

        onSnapshot(doc(db, "users", user), (ds) => {
            if(ds.exists()) {
                const d = ds.data();
                const daily = d.lastDate === today ? d.dailyCount : 0;
                document.getElementById('countText').innerText = daily;
                document.getElementById('lifeTotal').innerText = d.totalCount.toLocaleString();
                document.getElementById('streakDisplay').innerText = `🔥 ${d.streak || 0} DAY STREAK`;
                updateUI(daily);

                if(d.sankalpGoal && d.sankalpDate === today) {
                    document.getElementById('goalBar').style.display = 'block';
                    document.getElementById('gText').innerText = `${daily} / ${d.sankalpGoal}`;
                    document.getElementById('gFill').style.width = Math.min((daily/d.sankalpGoal)*100, 100) + "%";
                }
            }
        });

        window.createRipple = async (e) => {
            if(e.target.closest('.dock')) return;

            const rip = document.createElement('div');
            rip.className = 'ripple';
            rip.style.left = e.clientX + 'px';
            rip.style.top = e.clientY + 'px';
            document.body.appendChild(rip);
            setTimeout(() => rip.remove(), 600);

            if(navigator.vibrate) navigator.vibrate(50);

            await setDoc(doc(db, "users", user), { 
                dailyCount: increment(1), 
                totalCount: increment(1), 
                lastDate: today, 
                lastTimestamp: Date.now() 
            }, { merge: true });
        };

        window.openSankalp = () => {
            const m = prompt("Kitni Mala ka Sankalp hai?");
            if(m && !isNaN(m)) {
                setDoc(doc(db, "users", user), { sankalpGoal: m * 108, sankalpDate: today }, { merge: true });
            }
        };
    </script>
</body>
</html>
