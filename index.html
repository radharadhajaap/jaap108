<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Radha Rani Jaap Pro</title>
    <style>
        :root { --orange: #f38630; --text: #ffffff; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: #0d0905; color: var(--text);
            overflow: hidden;
        }

        /* Fixed Background Styling */
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1620121692029-d088224efc74?q=80&w=1932');
            background-size: cover; background-position: center;
            z-index: -1;
        }

        /* Glassmorphism Navigation */
        .top-nav {
            position: fixed; top: 20px; width: 100%; display: flex;
            justify-content: space-evenly; padding: 0 10px; z-index: 100;
        }
        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 18px; border-radius: 50px;
            color: white; font-size: 0.8rem; cursor: pointer;
            text-decoration: none; display: flex; align-items: center; gap: 8px;
        }

        /* Global Progress Bar */
        .global-section {
            position: fixed; top: 85px; width: 90%; left: 5%;
            background: rgba(0, 0, 0, 0.4); border-radius: 15px;
            padding: 10px; border: 1px solid rgba(243, 134, 48, 0.3);
            text-align: center; font-size: 0.75rem;
        }
        .progress-track {
            height: 6px; background: rgba(255,255,255,0.1);
            border-radius: 10px; margin-top: 8px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #f38630, #ffcc33);
            width: 0%; transition: width 1s ease-in-out;
        }

        .main-content {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        .mantra-text {
            font-size: 2.2rem; font-weight: bold; margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(243, 134, 48, 0.8); color: white;
        }

        /* Digital Mala UI */
        .mala-circle {
            position: relative; width: 280px; height: 280px;
            margin: 20px auto; display: flex; align-items: center; justify-content: center;
        }
        .mala-beads-svg {
            position: absolute; width: 100%; height: 100%;
            transform: rotate(-90deg); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .inner-stats { position: relative; z-index: 10; }
        .daily-num { font-size: 5.5rem; font-weight: 800; line-height: 1; margin: 0; }
        
        .footer-info { margin-top: 30px; font-size: 0.9rem; opacity: 0.8; }
        
        /* Tap Animations */
        .float-radhe {
            position: absolute; color: #ffcc33; font-weight: bold;
            pointer-events: none; animation: floatUp 0.8s ease-out forwards;
            font-size: 1.5rem; text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.2); }
        }
    </style>
</head>
<body onclick="handleTap(event)">

    <div class="bg-container"></div>
    <audio id="bellSound"><source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

    <div class="top-nav">
        <div class="nav-btn" onclick="toggleMeditation(event)"><span>🧘</span> Timer</div>
        <div class="nav-btn" onclick="toggleTheme(event)"><span>🌓</span> Theme</div>
        <a href="leaderboard.html" class="nav-btn"><span>🏆</span> Rank</a>
    </div>

    <div class="global-section">
        <span style="color: #ffcc33;">🌍 Community Goal:</span> 1,00,000 | <b><span id="globalDone">0</span></b>
        <div class="progress-track"><div class="progress-fill" id="goalFill"></div></div>
    </div>

    <div class="main-content">
        <div id="streakDisplay" style="color:#ffeb3b; font-size: 1.1rem; margin-bottom: 10px;">🔥 0 Day Streak</div>
        <div class="mantra-text">Radha Radha</div>
        
        <div class="mala-circle">
            <svg class="mala-beads-svg" id="malaSvg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" stroke-dasharray="2,2" />
                <circle id="progressCircle" cx="50" cy="50" r="45" fill="none" stroke="#f38630" stroke-width="3" stroke-linecap="round" stroke-dasharray="282.7" stroke-dashoffset="282.7" style="transition: stroke-dashoffset 0.3s;"/>
                <circle cx="50" cy="5" r="3" fill="#ffcc33">
                    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite" />
                </circle>
            </svg>
            <div class="inner-stats">
                <p class="daily-num" id="dailyDisplay">0</p>
                <p style="font-size: 0.8rem; letter-spacing: 3px; margin: 0; color: var(--orange);">MALA COUNT</p>
            </div>
        </div>

        <div class="footer-info">
            TOTAL JAAP: <b id="totalDisplay" style="color:var(--orange)">0</b>
            <p style="font-size: 0.7rem; margin-top: 15px; opacity: 0.5;">TAP ANYWHERE TO CHANT</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, increment, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArfXVNLQhYAspd2xmZuwLb7bxLaY8sQqY",
            authDomain: "jaap-fdd80.firebaseapp.com",
            projectId: "jaap-fdd80",
            storageBucket: "jaap-fdd80.firebasestorage.app",
            messagingSenderId: "375289521394",
            appId: "1:375289521394:web:ced2cafa4d1743d5ab9c6b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userName = localStorage.getItem('jaapUserName');
        const today = new Date().toLocaleDateString();

        if(!userName) window.location.href = "login.html";

        let rotation = 0;

        onSnapshot(doc(db, "users", userName), (ds) => {
            if(ds.exists()) {
                const data = ds.data();
                const daily = data.lastDate === today ? data.dailyCount : 0;
                document.getElementById('dailyDisplay').innerText = daily;
                document.getElementById('totalDisplay').innerText = data.totalCount;
                document.getElementById('streakDisplay').innerText = `🔥 ${data.streak || 0} Day Streak`;
                
                // Update Circular Progress
                const circle = document.getElementById('progressCircle');
                const offset = 282.7 - (daily % 108 / 108) * 282.7;
                circle.style.strokeDashoffset = offset;
            }
        });

        onSnapshot(collection(db, "users"), (snap) => {
            let total = 0;
            snap.forEach(d => total += (d.data().totalCount || 0));
            document.getElementById('globalDone').innerText = total.toLocaleString();
            document.getElementById('goalFill').style.width = Math.min((total / 100000) * 100, 100) + "%";
        });

        window.handleTap = async (e) => {
            if(e.target.closest('.nav-btn')) return;

            // Animate Mala Rotation
            rotation += (360 / 108);
            document.getElementById('malaSvg').style.transform = `rotate(${rotation - 90}deg)`;

            // Floating Text
            const f = document.createElement('div');
            f.className = 'float-radhe'; f.innerText = 'Radhe';
            f.style.left = e.clientX + 'px'; f.style.top = e.clientY + 'px';
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 800);

            // Firebase Update
            const userRef = doc(db, "users", userName);
            await setDoc(userRef, {
                dailyCount: increment(1),
                totalCount: increment(1),
                lastDate: today,
                lastTimestamp: Date.now()
            }, { merge: true });

            if(navigator.vibrate) navigator.vibrate(40);
        };
    </script>
</body>
</html>
