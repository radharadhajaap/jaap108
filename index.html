<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jaap App</title>
    <style>
        :root { --orange: #f38630; --bg: #0d0905; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.95)), url('https://images.unsplash.com/photo-1620121692029-d088224efc74?q=80&w=1932') center/cover; z-index: -1; opacity: 0.6; }
        .top-nav { position: fixed; top: 15px; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; box-sizing: border-box; z-index: 100; }
        .btn { background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 20px; border: 1px solid var(--orange); color: white; text-decoration: none; font-size: 0.8rem; cursor: pointer; }
        .ticker { position: fixed; top: 65px; width: 100%; background: rgba(243,134,48,0.1); padding: 5px 0; font-size: 0.75rem; white-space: nowrap; overflow: hidden; color: #ffd700; }
        .ticker-move { display: inline-block; animation: move 20s linear infinite; }
        @keyframes move { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .main { text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 20px; }
        .quote { font-style: italic; font-size: 0.85rem; opacity: 0.7; margin-bottom: 20px; min-height: 40px; }
        .streak { color: #ffeb3b; font-size: 1.1rem; margin-bottom: 5px; }
        .mantra { font-size: 2.2rem; font-weight: bold; margin-bottom: 15px; text-shadow: 0 0 15px var(--orange); }
        .circle-box { position: relative; width: 220px; height: 220px; margin: 0 auto; }
        svg { transform: rotate(-90deg); }
        .progress { fill: none; stroke: var(--orange); stroke-width: 10; stroke-linecap: round; transition: 0.3s; }
        .count-inner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .float { position: absolute; color: white; animation: float 1s forwards; font-weight: bold; pointer-events: none; }
        @keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body onclick="handleTap(event)">
    <audio id="bgMusic" loop preload="auto"><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3"></audio>
    <div class="bg"></div>
    <div class="top-nav">
        <div class="btn" onclick="toggleMusic(event)" id="musicBtn">🔈 Music Off</div>
        <a href="leaderboard.html" class="btn">🏆 Rank</a>
    </div>
    <div class="ticker"><div class="ticker-move" id="liveTicker">Radhe Radhe... 🙏</div></div>
    <div class="main">
        <div class="streak" id="streakDisplay">🔥 0 Days Streak</div>
        <div class="quote" id="quoteBox">"Loading wisdom..."</div>
        <div class="mantra">Radha Radha</div>
        <div class="circle-box">
            <svg width="220" height="220"><circle cx="110" cy="110" r="100" stroke="rgba(255,255,255,0.05)" stroke-width="10" fill="none"/><circle id="prog" class="progress" cx="110" cy="110" r="100"/></svg>
            <div class="count-inner"><span id="daily" style="font-size:4rem;font-weight:bold">0</span><br><small>DAILY</small></div>
        </div>
        <p style="margin-top:20px;opacity:0.6">TOTAL: <span id="total" style="color:var(--orange)">0</span></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, increment, collection, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArfXVNLQhYAspd2xmZuwLb7bxLaY8sQqY",
            authDomain: "jaap-fdd80.firebaseapp.com",
            projectId: "jaap-fdd80",
            storageBucket: "jaap-fdd80.firebasestorage.app",
            messagingSenderId: "375289521394",
            appId: "1:375289521394:web:ced2cafa4d1743d5ab9c6b"
        };
        const db = getFirestore(initializeApp(firebaseConfig));
        const user = localStorage.getItem('jaapUserName');
        const today = new Date().toLocaleDateString();

        const quotes = ["Pure love is the way to Krishna.", "Always remember Radha Rani.", "Chant with heart.", "Peace starts with a prayer."];
        document.getElementById('quoteBox').innerText = quotes[Math.floor(Math.random()*quotes.length)];

        if(!user) window.location.href="login.html";

        onSnapshot(doc(db, "users", user), (ds) => {
            if(ds.exists()){
                const d = ds.data();
                const dailyCount = d.lastDate === today ? d.dailyCount : 0;
                document.getElementById('daily').innerText = dailyCount;
                document.getElementById('total').innerText = d.totalCount;
                document.getElementById('streakDisplay').innerText = `🔥 ${d.streak || 0} Days Streak`;
                const circ = 2 * Math.PI * 100;
                document.getElementById('prog').style.strokeDasharray = circ;
                document.getElementById('prog').style.strokeDashoffset = circ - (dailyCount % 108 / 108) * circ;
            }
        });

        onSnapshot(query(collection(db, "users"), orderBy("lastTimestamp", "desc"), limit(5)), (sn) => {
            let t = ""; sn.forEach(d => t += ` • ${d.id} is chanting 🙏 `);
            document.getElementById('liveTicker').innerText = t + t;
        });

        window.toggleMusic = (e) => {
            e.stopPropagation();
            const m = document.getElementById('bgMusic');
            const b = document.getElementById('musicBtn');
            if(m.paused) { m.play(); b.innerHTML = "🔊 Music On"; b.style.background = "var(--orange)"; }
            else { m.pause(); b.innerHTML = "🔈 Music Off"; b.style.background = "rgba(255,255,255,0.1)"; }
        };

        window.handleTap = async (e) => {
            if(e.target.closest('.btn')) return;
            const f = document.createElement('div'); f.className='float'; f.innerText='Radha Radha';
            f.style.left=e.clientX+'px'; f.style.top=e.clientY+'px'; document.body.appendChild(f);
            setTimeout(()=>f.remove(), 1000);

            const userRef = doc(db, "users", user);
            await setDoc(userRef, { dailyCount: increment(1), totalCount: increment(1), lastDate: today, lastTimestamp: Date.now() }, { merge: true });
            if(navigator.vibrate) navigator.vibrate(40);
        };
    </script>
</body>
</html>
