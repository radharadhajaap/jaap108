<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Radha Rani Jaap Pro</title>
    <style>
        :root { --orange: #f38630; --glass: rgba(255, 255, 255, 0.1); }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: #0d0905; color: white; overflow: hidden;
        }

        /* Fixed Background for Daily Darshan */
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            z-index: -1; transition: background-image 1s ease-in-out;
        }

        /* Glass Nav */
        .top-nav {
            position: fixed; top: 20px; width: 100%; display: flex;
            justify-content: space-evenly; padding: 0 10px; z-index: 100;
        }
        .nav-btn {
            background: var(--glass); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 10px 18px; border-radius: 50px; color: white; font-size: 0.8rem;
            text-decoration: none; cursor: pointer; display: flex; align-items: center; gap: 8px;
        }

        /* Community Goal Section */
        .global-section {
            position: fixed; top: 85px; width: 90%; left: 5%;
            background: rgba(0, 0, 0, 0.5); border-radius: 15px;
            padding: 10px; border: 1px solid rgba(243, 134, 48, 0.2);
            text-align: center; font-size: 0.75rem;
        }
        .progress-track { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #f38630, #ffcc33); width: 0%; transition: width 1s; }

        .main-content { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }

        .mantra-text { font-size: 2.2rem; font-weight: bold; margin-bottom: 5px; text-shadow: 0 0 20px rgba(243, 134, 48, 0.8); }

        /* Digital Mala */
        .mala-circle { position: relative; width: 280px; height: 280px; margin: 20px auto; display: flex; align-items: center; justify-content: center; }
        .mala-svg { position: absolute; width: 100%; height: 100%; transform: rotate(-90deg); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .inner-stats { position: relative; z-index: 10; }
        .daily-num { font-size: 5.5rem; font-weight: 800; line-height: 1; margin: 0; }
        
        .footer-info { margin-top: 30px; font-size: 0.9rem; opacity: 0.8; }
        
        /* Floating Radhe Animation */
        .float-text { position: absolute; color: #ffcc33; font-weight: bold; pointer-events: none; animation: floatUp 0.8s ease-out forwards; font-size: 1.5rem; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body onclick="handleTap(event)">

    <div class="bg-container" id="dailyDarshanBg"></div>
    <audio id="bellSound"><source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

    <div class="top-nav">
        <div class="nav-btn" onclick="toggleMeditation(event)" id="timerBtn"><span>🧘</span> Timer</div>
        <a href="leaderboard.html" class="nav-btn"><span>🏆</span> Leaderboard</a>
    </div>

    <div class="global-section">
        <span style="color: #ffcc33;">🌍 Community Goal:</span> 1,00,000 | <b><span id="globalDone">0</span></b>
        <div class="progress-track"><div class="progress-fill" id="goalFill"></div></div>
    </div>

    <div class="main-content">
        <div id="streakDisplay" style="color:#ffeb3b; font-size: 1.1rem; margin-bottom: 10px;">🔥 0 Day Streak</div>
        <div class="mantra-text">Radha Radha</div>
        
        <div class="mala-circle">
            <svg class="mala-svg" id="malaSvg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" stroke-dasharray="2,2" />
                <circle id="progressCircle" cx="50" cy="50" r="45" fill="none" stroke="#f38630" stroke-width="3" stroke-dasharray="282.7" stroke-dashoffset="282.7" style="transition: 0.3s;"/>
                <circle cx="50" cy="5" r="3" fill="#ffcc33" />
            </svg>
            <div class="inner-stats">
                <p class="daily-num" id="dailyDisplay">0</p>
                <p style="font-size: 0.7rem; letter-spacing: 3px; margin: 0; color: var(--orange);">DAILY JAAP</p>
            </div>
        </div>

        <div class="footer-info">
            MY TOTAL: <b id="totalDisplay" style="color:var(--orange)">0</b>
            <p style="font-size: 0.6rem; margin-top: 15px; opacity: 0.5;">TAP ANYWHERE TO CHANT</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, increment, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArfXVNLQhYAspd2xmZuwLb7bxLaY8sQqY",
            authDomain: "jaap-fdd80.firebaseapp.com",
            projectId: "jaap-fdd80",
            storageBucket: "jaap-fdd80.firebasestorage.app",
            messagingSenderId: "375289521394",
            appId: "1:375289521394:web:ced2cafa4d1743d5ab9c6b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userName = localStorage.getItem('jaapUserName');
        const today = new Date().toLocaleDateString();

        if(!userName) window.location.href = "login.html";

        let rotation = 0;

        // Daily Darshan Images
        const darshanImages = [
            "https://images.unsplash.com/photo-1620121692029-d088224efc74?q=80&w=1932",
            "https://images.unsplash.com/photo-1544924222-355b1f0ad5a7?q=80&w=1932",
            "https://images.unsplash.com/photo-1506191696232-49195305149b?q=80&w=1932"
        ];

        function initApp() {
            // Set Daily Image
            const dayIdx = new Date().getDate() % darshanImages.length;
            document.getElementById('dailyDarshanBg').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)), url('${darshanImages[dayIdx]}')`;

            // Listen for User Data
            onSnapshot(doc(db, "users", userName), (ds) => {
                if(ds.exists()) {
                    const data = ds.data();
                    const daily = data.lastDate === today ? data.dailyCount : 0;
                    document.getElementById('dailyDisplay').innerText = daily;
                    document.getElementById('totalDisplay').innerText = data.totalCount;
                    document.getElementById('streakDisplay').innerText = `🔥 ${data.streak || 0} Day Streak`;
                    
                    const circle = document.getElementById('progressCircle');
                    circle.style.strokeDashoffset = 282.7 - (daily % 108 / 108) * 282.7;
                }
            });

            // Community Goal
            onSnapshot(collection(db, "users"), (snap) => {
                let total = 0; snap.forEach(d => total += (d.data().totalCount || 0));
                document.getElementById('globalDone').innerText = total.toLocaleString();
                document.getElementById('goalFill').style.width = Math.min((total / 100000) * 100, 100) + "%";
            });
        }

        window.handleTap = async (e) => {
            if(e.target.closest('.nav-btn')) return;

            rotation += (360 / 108);
            document.getElementById('malaSvg').style.transform = `rotate(${rotation - 90}deg)`;

            const f = document.createElement('div');
            f.className = 'float-text'; f.innerText = 'Radhe';
            f.style.left = e.clientX + 'px'; f.style.top = e.clientY + 'px';
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 800);

            const userRef = doc(db, "users", userName);
            await setDoc(userRef, {
                dailyCount: increment(1),
                totalCount: increment(1),
                lastDate: today,
                lastTimestamp: Date.now()
            }, { merge: true });

            const currentDaily = parseInt(document.getElementById('dailyDisplay').innerText);
            if((currentDaily + 1) % 108 === 0) document.getElementById('bellSound').play();
            if(navigator.vibrate) navigator.vibrate(40);
        };

        initApp();
    </script>
</body>
</html>
