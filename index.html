<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radha Rani Jaap - Horizon Layout</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #FFD700; 
            --surface: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html { 
            margin: 0; height: 100%; background: #050301; color: white;
            font-family: 'Outfit', sans-serif; overflow: hidden;
        }

        /* 1. TOP SECTION: Elegant Header */
        .layout-header {
            position: fixed; top: 0; width: 100%; height: 80px;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 10;
        }
        .mantra-banner {
            font-size: 1.2rem; letter-spacing: 8px; font-weight: 300;
            text-transform: uppercase; color: var(--gold); opacity: 0.8;
        }

        /* 2. CENTER SECTION: Immersive Tap Zone */
        .tap-zone {
            height: 100vh; width: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative;
        }
        .main-display {
            text-align: center; transform: translateY(-40px);
        }
        .huge-num {
            font-size: 11rem; font-weight: 900; line-height: 0.8;
            margin: 0; background: linear-gradient(#fff, #999);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* 3. BOTTOM SECTION: Ergonomic Controls */
        .layout-footer {
            position: fixed; bottom: 0; width: 100%;
            background: linear-gradient(to top, #000 70%, transparent);
            padding-bottom: 40px; z-index: 20;
        }

        /* Side-by-Side Stat Cards */
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            padding: 0 25px; margin-bottom: 25px;
        }
        .grid-card {
            background: var(--surface); border: 1px solid var(--border);
            padding: 15px; border-radius: 20px; backdrop-filter: blur(20px);
        }
        .label { font-size: 0.65rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .val { font-size: 1.2rem; font-weight: 700; color: #fff; }

        /* Compact Navigation Dock */
        .nav-dock {
            width: 85%; margin: 0 auto;
            background: rgba(255,255,255,0.08); border: 1px solid var(--border);
            border-radius: 30px; display: flex; justify-content: space-around;
            padding: 12px 0;
        }
        .nav-item { font-size: 1.4rem; opacity: 0.6; }
    </style>
</head>
<body>

    <header class="layout-header">
        <div class="mantra-banner">Radha Radha</div>
    </header>

    <main class="tap-zone" onclick="handleTap()">
        <div class="main-display">
            <h1 class="huge-num" id="daily">0</h1>
            <div style="font-size: 0.8rem; color: var(--gold); margin-top: 10px; letter-spacing: 3px;">
                MALA IN PROGRESS
            </div>
        </div>
    </main>

    <footer class="layout-footer">
        <div class="stats-grid">
            <div class="grid-card">
                <div class="label">Today's Mala</div>
                <div class="val" id="mala">0.0</div>
            </div>
            <div class="grid-card">
                <div class="label">Total Jaap</div>
                <div class="val" id="total">1,240</div>
            </div>
        </div>

        <nav class="nav-dock">
            <div class="nav-item">📜</div>
            <div class="nav-item">🖼️</div>
            <div class="nav-item">🏆</div>
            <div class="nav-item">⚙️</div>
        </nav>
    </footer>

    <script>
        let count = 0;
        function handleTap() {
            count++;
            document.getElementById('daily').innerText = count;
            document.getElementById('mala').innerText = (count / 108).toFixed(1);
            
            // Haptic Feedback
            if(navigator.vibrate) navigator.vibrate(30);
        }
    </script>
</body>
</html>
