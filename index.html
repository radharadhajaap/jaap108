<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radha Rani Jaap - Button V11</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #FFD700; 
            --bg: #080705;
            --btn-grad: linear-gradient(145deg, #1a1a1a, #000000);
            --shadow: 10px 10px 20px #030303, -5px -5px 15px #141414;
        }

        body, html { 
            margin: 0; height: 100%; background: var(--bg); 
            display: flex; align-items: center; justify-content: center;
            font-family: 'Outfit', sans-serif; overflow: hidden;
        }

        /* The Main Interactive Button Container */
        .button-engine {
            position: relative; width: 280px; height: 280px;
            display: flex; align-items: center; justify-content: center;
        }

        /* 3D Neumorphic Base */
        .tap-pad {
            width: 240px; height: 240px;
            background: var(--btn-grad);
            border-radius: 50%;
            border: 2px solid rgba(255, 215, 0, 0.1);
            box-shadow: var(--shadow);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        /* Physical Click Effect */
        .tap-pad:active {
            transform: scale(0.92);
            box-shadow: inset 5px 5px 15px #000, inset -5px -5px 15px #1a1a1a;
            border-color: var(--gold);
        }

        /* Dynamic Glow Behind Button */
        .btn-aura {
            position: absolute; width: 200px; height: 200px;
            background: var(--gold); border-radius: 50%;
            filter: blur(80px); opacity: 0.1;
            transition: 0.3s; pointer-events: none;
        }

        .count-text {
            font-size: 8rem; margin: 0;
            background: linear-gradient(180deg, #fff, #888);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            pointer-events: none;
        }

        /* Ripple Animation */
        .ripple {
            position: absolute; border: 2px solid var(--gold);
            border-radius: 50%; pointer-events: none;
            animation: rippleEffect 0.6s ease-out forwards;
        }
        @keyframes rippleEffect {
            0% { width: 240px; height: 240px; opacity: 0.5; }
            100% { width: 450px; height: 450px; opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="button-engine">
        <div class="btn-aura" id="aura"></div>
        <div class="tap-pad" id="mainButton" onpointerdown="triggerButton(event)">
            <h1 class="count-text" id="counter">0</h1>
        </div>
    </div>

    <script>
        let count = 0;
        const btn = document.getElementById('mainButton');
        const aura = document.getElementById('aura');
        const counter = document.getElementById('counter');

        function triggerButton(e) {
            count++;
            counter.innerText = count;

            // 1. Create Ripple
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);

            // 2. Increase Aura on high count
            const intensity = Math.min(0.1 + (count % 108) * 0.005, 0.6);
            aura.style.opacity = intensity;
            aura.style.transform = `scale(${1 + intensity})`;

            // 3. Physical Haptics
            if(navigator.vibrate) {
                if(count % 108 === 0) {
                    navigator.vibrate([100, 50, 100, 50, 200]);
                    aura.style.background = '#00faff'; // Color shift on Mala
                } else {
                    navigator.vibrate(35);
                }
            }
        }
    </script>
</body>
</html>
